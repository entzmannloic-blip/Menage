function closeEffortModal(){document.getElementById('efOv').classList.remove('on');}

function renderScopeDashboard(body,secs,scopeLabel){
  let totalAll=0,totalDone=0;
  let ge1=[],ge2=[],ge3=[];
  secs.forEach(sec=>{
    secTasks(sec).forEach(t=>{
      totalAll++;
      if(isDone(t.id)){totalDone++;}
      else{
        const ef=t.effort||0;
        const tw={...t,secIcon:sec.icon,secName:sec.name};
        if(ef===1)ge1.push(tw);else if(ef===2)ge2.push(tw);else if(ef===3)ge3.push(tw);
      }
    });
  });
  const pct=totalAll>0?Math.round(totalDone/totalAll*100):0;
  const left=totalAll-totalDone;
  const minLeft=secs.flatMap(s=>secTasks(s).filter(t=>!isDone(t.id))).reduce((a,t)=>a+getMin(t),0);

  const donutWrap=document.createElement('div');donutWrap.className='db-donut-wrap';
  donutWrap.innerHTML=`
    ${makeSVGDonut(pct,totalDone,totalAll,'var(--gr)',140)}
    <div class="db-donut-legend">
      <div class="db-legend-item"><div class="db-legend-dot" style="background:var(--gr)"></div><span class="db-legend-val">${totalDone}</span><span class="db-legend-lbl">complétées</span></div>
      <div class="db-legend-item"><div class="db-legend-dot" style="background:var(--bdm)"></div><span class="db-legend-val">${left}</span><span class="db-legend-lbl">restantes</span></div>
      <div class="db-legend-item"><div class="db-legend-dot" style="background:var(--am)"></div><span class="db-legend-val">${fmtMin(minLeft)}</span><span class="db-legend-lbl">temps restant</span></div>
    </div>`;
  body.appendChild(donutWrap);

  const efRow=document.createElement('div');efRow.className='db-effort-row';
  efRow.appendChild(buildEffortCard('🟢','Rapides',ge1.length,fmtMin(ge1.reduce((a,t)=>a+getMin(t),0)),ge1));
  efRow.appendChild(buildEffortCard('🟡','Moyennes',ge2.length,fmtMin(ge2.reduce((a,t)=>a+getMin(t),0)),ge2));
  efRow.appendChild(buildEffortCard('🔴','Longues',ge3.length,fmtMin(ge3.reduce((a,t)=>a+getMin(t),0)),ge3));
  body.appendChild(efRow);

  const lbl=document.createElement('div');lbl.className='db-grid-label';lbl.textContent=scopeLabel;body.appendChild(lbl);
  const grid=document.createElement('div');grid.className='db-grid';
  secs.forEach(sec=>{
    const s=calcSecStats(sec);
    const card=document.createElement('div');
    card.className='db-sec-card'+(s.pct===100&&s.total>0?' complete':'');
    card.innerHTML=`
      <div class="db-sec-card-top">
        <div class="db-sec-icon" style="background:${sec.colorL}">${sec.icon}</div>
        <div class="db-sec-name">${sec.name}</div>
      </div>
      <div class="db-sec-pct">${s.pct}%</div>
      <div class="db-sec-bar-bg"><div class="db-sec-bar-fill" style="width:${s.pct}%;background:${sec.color}"></div></div>
      <div class="db-sec-meta">
        <span>${s.done}/${s.total}</span>
        <span>${s.timeLeft>0?'~'+fmtMin(s.timeLeft):''}</span>
      </div>
      <div class="db-sec-efforts">
        ${s.e1>0?`<span class="db-sec-ef">🟢${s.e1}</span>`:''}
        ${s.e2>0?`<span class="db-sec-ef">🟡${s.e2}</span>`:''}
        ${s.e3>0?`<span class="db-sec-ef">🔴${s.e3}</span>`:''}
        ${s.pct===100?'<span style="font-size:11px;color:var(--gr);font-weight:600;">✓</span>':''}
      </div>`;
    card.onclick=()=>{
      closeDashboard();
      activeRoom=sec.id;
      if(expressMode){expressMode=false;const eb=document.getElementById('expressBtn');if(eb){eb.classList.remove('foc');eb.textContent='⚡ Vue express';}}
      renderAll();
    };
    grid.appendChild(card);
  });
  body.appendChild(grid);
}

    <div>
      <div class="db-room-title">${sec.name}</div>
      <div class="db-room-meta">${s.done}/${s.total} tâches · ${s.pct===100?'✓ Terminé':'~'+fmtMin(s.timeLeft)+' restantes'}</div>
    </div>`;
  body.appendChild(hdr);

  // Donut
  const donutWrap=document.createElement('div');donutWrap.className='db-donut-wrap';
  donutWrap.innerHTML=`
    ${makeSVGDonut(s.pct,s.done,s.total,sec.color,130)}
    <div class="db-donut-legend">
      <div class="db-legend-item"><div class="db-legend-dot" style="background:${sec.color}"></div><span class="db-legend-val">${s.done}</span><span class="db-legend-lbl">complétées · ${fmtMin(minDone)}</span></div>
      <div class="db-legend-item"><div class="db-legend-dot" style="background:var(--bdm)"></div><span class="db-legend-val">${s.total-s.done}</span><span class="db-legend-lbl">restantes · ${fmtMin(s.timeLeft)}</span></div>
    </div>`;
  body.appendChild(donutWrap);

  // Effort cards — clickable, tasks tagged with section
  const pe1=s.pending.filter(t=>t.effort===1).map(t=>({...t,secIcon:sec.icon,secName:sec.name}));
  const pe2=s.pending.filter(t=>t.effort===2).map(t=>({...t,secIcon:sec.icon,secName:sec.name}));
  const pe3=s.pending.filter(t=>t.effort===3).map(t=>({...t,secIcon:sec.icon,secName:sec.name}));
  const m1=pe1.reduce((a,t)=>a+getMin(t),0);
  const m2=pe2.reduce((a,t)=>a+getMin(t),0);
  const m3=pe3.reduce((a,t)=>a+getMin(t),0);

  const efRow=document.createElement('div');efRow.className='db-effort-row';
  efRow.appendChild(buildEffortCard('🟢','Rapides',pe1.length,fmtMin(m1),pe1));
  efRow.appendChild(buildEffortCard('🟡','Moyennes',pe2.length,fmtMin(m2),pe2));
  efRow.appendChild(buildEffortCard('🔴','Longues',pe3.length,fmtMin(m3),pe3));
  body.appendChild(efRow);

  if(s.pct===100){
    const done=document.createElement('div');done.className='empty';done.style.paddingTop='1rem';
    done.innerHTML='<span class="empty-icon">✅</span><div class="empty-title">Section complète !</div>';
    body.appendChild(done);
  }
}

/* ═══ PLANNING UI ═══ */
let planTab='week';
let planWeek=currentWeekKey();

function openPlanning(tab){
  planWeek=currentWeekKey();
  document.getElementById('planOv').classList.add('on');
  if(tab) switchPlanTab(tab);
  else renderPlanning();
}
function closePlanning(){
  archiveWeek(planWeek);
  document.getElementById('planOv').classList.remove('on');
}
function switchPlanTab(tab){
  planTab=tab;
  ['week','loic','perrine','synth','hist','charge'].forEach(t=>{
    const el=document.getElementById('planTab'+t.charAt(0).toUpperCase()+t.slice(1));
    if(el)el.classList.toggle('active',t===tab);
  });
  const showNav=['week','loic','perrine','synth'].includes(tab);
  document.getElementById('planWeekNav').style.display=showNav?'flex':'none';
  renderPlanning();
}
function navPlanWeek(dir){
  archiveWeek(planWeek);
  planWeek=dir<0?prevWeekKey(planWeek):nextWeekKey(planWeek);
  renderPlanning();
}
function goTodayWeek(){archiveWeek(planWeek);planWeek=currentWeekKey();renderPlanning();}

function renderPlanning(){
  const body=document.getElementById('planBody');
  body.innerHTML='';
  document.getElementById('planWeekLabel').textContent=weekLabel(planWeek);
  const isCurrent=planWeek===currentWeekKey();
  if(planTab==='week') renderPlanGlobal(body);
  else if(planTab==='loic') renderPlanPerson(body,'loic','👤','#1b4b87');
  else if(planTab==='perrine') renderPlanPerson(body,'perrine','👤','#b07a2c');
  else if(planTab==='synth') renderPlanSynth(body);
  else if(planTab==='hist') renderPlanHist(body);
  else renderPlanCharge(body);
}

/* ── Global tab: donut + effort cards + balance ── */
function renderPlanGlobal(body){
  body.className="plan-body full";body.style.padding="1.25rem";body.style.overflowY="auto";
  const tasks=getWeekTasks(planWeek);
  const loicT=tasks.filter(t=>t.owner==='loic');
  const perrineT=tasks.filter(t=>t.owner==='perrine');
  const loicDone=loicT.filter(t=>isWeekDone(t.id,planWeek)).length;
  const perrineDone=perrineT.filter(t=>isWeekDone(t.id,planWeek)).length;
  const totalDone=loicDone+perrineDone;
  const total=tasks.length;
  const pct=total>0?Math.round(totalDone/total*100):0;
  const loicMin=loicT.reduce((a,t)=>a+t.min,0);
  const perrineMin=perrineT.reduce((a,t)=>a+t.min,0);
  const totalMin=loicMin+perrineMin;

  // Donut + legend
  const r=52,cx=64,cy=64,circ=2*Math.PI*r;

  donutWrap.innerHTML=`
    <svg width="140" height="140" viewBox="0 0 128 128">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--bd)" stroke-width="14"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--gr)" stroke-width="14"
        stroke-dasharray="${filled} ${circ-filled}" stroke-dashoffset="${circ/4}" stroke-linecap="round"
        style="transition:stroke-dasharray .6s cubic-bezier(.4,0,.2,1)"/>
      <text x="${cx}" y="${cy-8}" text-anchor="middle" font-family="Fraunces,serif" font-size="22" font-weight="600" fill="var(--tx)">${pct}%</text>
      <text x="${cx}" y="${cy+12}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="var(--tx3)">${totalDone}/${total}</text>
      <text x="${cx}" y="${cy+26}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="var(--tx3)">tâches</text>
    </svg>
    <div class="db-donut-legend">
      <div class="db-legend-item"><span style="width:10px;height:10px;border-radius:50%;background:#1b4b87;flex-shrink:0;display:inline-block"></span><span class="db-legend-val">${loicDone}/${loicT.length}</span><span class="db-legend-lbl">Loïc · ${fmtMin(loicT.filter(t=>isWeekDone(t.id,planWeek)).reduce((a,t)=>a+t.min,0))}/${fmtMin(loicMin)}</span></div>
      <div class="db-legend-item"><span style="width:10px;height:10px;border-radius:50%;background:#b07a2c;flex-shrink:0;display:inline-block"></span><span class="db-legend-val">${perrineDone}/${perrineT.length}</span><span class="db-legend-lbl">Perrine · ${fmtMin(perrineT.filter(t=>isWeekDone(t.id,planWeek)).reduce((a,t)=>a+t.min,0))}/${fmtMin(perrineMin)}</span></div>
      <div class="db-legend-item"><span style="width:10px;height:10px;border-radius:50%;background:var(--am);flex-shrink:0;display:inline-block"></span><span class="db-legend-val">${fmtMin(totalMin-tasks.filter(t=>isWeekDone(t.id,planWeek)).reduce((a,t)=>a+t.min,0))}</span><span class="db-legend-lbl">temps restant</span></div>
    </div>`;
  body.appendChild(donutWrap);

  // Effort cards — grouped for this week, clickable → effort modal
  const e1=tasks.filter(t=>!isWeekDone(t.id,planWeek)&&t.effort===1);
  const e2=tasks.filter(t=>!isWeekDone(t.id,planWeek)&&t.effort===2);
  const e3=tasks.filter(t=>!isWeekDone(t.id,planWeek)&&t.effort===3);
  const efRow=document.createElement('div');efRow.className='db-effort-row';
  efRow.appendChild(buildPlanEffortCard('🟢','Rapides',e1,planWeek));

  efRow.appendChild(buildPlanEffortCard('🔴','Longues',e3,planWeek));
  body.appendChild(efRow);

  // Balance bar
  if(totalMin>0){
    const loicPct=Math.round(loicMin/totalMin*100);
    const diff=Math.abs(loicMin-perrineMin);
    const bal=diff<=15;
    const barEl=document.createElement('div');
    barEl.style.cssText='background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;';
    barEl.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:12px;font-weight:600;">Équilibre de charge — ${weekLabel(planWeek)}</span>
        <span style="font-size:11px;color:${bal?'var(--gr)':'var(--am)'};font-weight:600;background:${bal?'var(--grl)':'var(--aml)'};padding:2px 8px;border-radius:99px;">${bal?'⚖️ Équilibré':'⚠️ Écart '+fmtMin(diff)}</span>
      </div>
      <div style="display:flex;height:10px;border-radius:99px;overflow:hidden;gap:2px;">
        <div style="width:${loicPct}%;background:#1b4b87;border-radius:99px 0 0 99px;"></div>

      </div>`;
    body.appendChild(barEl);
  }

/* ── Effort card for planning (opens week-filtered modal) ── */
function buildPlanEffortCard(icon,label,tasks,weekKey){
  const count=tasks.length;
  const time=fmtMin(tasks.reduce((a,t)=>a+t.min,0));
  const wrap=document.createElement('div');wrap.className='db-effort-card';
  wrap.style.cursor=count>0?'pointer':'default';
  if(count>0){
    wrap.onmouseenter=()=>wrap.style.background='var(--s2)';
    wrap.onmouseleave=()=>wrap.style.background='';
    wrap.onclick=()=>openPlanEffortModal(icon,label,tasks,weekKey);
  }
  wrap.innerHTML=`<span class="db-effort-icon">${icon}</span><div class="db-effort-val">${count}</div><div class="db-effort-lbl">${label}</div><div class="db-effort-time">${time}</div>${count>0?'<div style="font-size:10px;color:var(--tx3);margin-top:5px;font-weight:500;">Voir les tâches →</div>':''}`;
  return wrap;
}

function openPlanEffortModal(icon,label,tasks,weekKey){
  document.getElementById('efTitle').textContent=icon+' '+label;
  document.getElementById('efMeta').textContent=tasks.length+' tâche'+(tasks.length>1?'s':'')+' · ~'+fmtMin(tasks.reduce((a,t)=>a+t.min,0));
  const body=document.getElementById('efBody');body.innerHTML='';
  tasks.forEach(task=>{
    const done=isWeekDone(task.id,weekKey);
    const row=document.createElement('div');row.className='ef-task-row'+(done?' done-row':'');
    row.innerHTML=`
      <div class="ef-task-cb" style="background:${done?'var(--gr)':'var(--sf)'};border-color:${done?'var(--gr)':'var(--bds)'};">
        <svg width="10" height="7" viewBox="0 0 10 7" fill="none" style="opacity:${done?1:0};">
          <path d="M1 3.5l2.5 2.5 5.5-5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="ef-task-origin">${task.secIcon||''} ${task.secName||''}</span>
      <span class="ef-task-label">${task.label}</span>
      <span style="font-size:10px;color:var(--tx3);flex-shrink:0;">${task.owner==='loic'?'👤 L':'👤 P'}</span>
      <span class="ef-task-dur">${fmtMin(task.min)}</span>`;
    row.onclick=()=>{
      const nowDone=!isWeekDone(task.id,weekKey);
      setWeekDone(task.id,weekKey,nowDone,task.owner);
      row.classList.toggle('done-row',nowDone);
      const cb=row.querySelector('.ef-task-cb');
      cb.style.background=nowDone?'var(--gr)':'var(--sf)';
      cb.style.borderColor=nowDone?'var(--gr)':'var(--bds)';
      cb.querySelector('svg').style.opacity=nowDone?'1':'0';
      renderPlanning();
    };
    body.appendChild(row);
  });
  document.getElementById('efOv').classList.add('on');
}

/* ── Person tab: one person's tasks this week ── */
function renderPlanPerson(body,person,emoji,color){
  body.className="plan-body full";body.style.padding="1.25rem";body.style.overflowY="auto";
  const tasks=getWeekTasks(planWeek).filter(t=>t.owner===person);
  const done=tasks.filter(t=>isWeekDone(t.id,planWeek)).length;
  const minTotal=tasks.reduce((a,t)=>a+t.min,0);
  const minDone=tasks.filter(t=>isWeekDone(t.id,planWeek)).reduce((a,t)=>a+t.min,0);
  const pct=tasks.length>0?Math.round(done/tasks.length*100):0;
  const name=person==='loic'?'Loïc':'Perrine';

  // Header
  const hdr=document.createElement('div');hdr.style.cssText='display:flex;align-items:center;gap:12px;margin-bottom:1rem;padding:1rem;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);';

    <span style="font-size:28px;">${emoji}</span>
    <div style="flex:1;">
      <div style="font-family:'Fraunces',serif;font-size:20px;font-weight:500;">${name}</div>
      <div style="font-size:12px;color:var(--tx3);">${done}/${tasks.length} tâches · ${fmtMin(minDone)} / ${fmtMin(minTotal)} effectuées</div>
    </div>
    <div style="font-family:'Fraunces',serif;font-size:28px;font-weight:600;color:${pct===100?'var(--gr)':color};">${pct}%</div>`;

  if(tasks.length===0){
    const em=document.createElement('div');em.className='empty';em.innerHTML='<span class="empty-icon">✅</span><div class="empty-title">Rien cette semaine !</div>';

  // Group by section
  const bySec={};
  tasks.forEach(t=>{if(!bySec[t.secId])bySec[t.secId]=[];bySec[t.secId].push(t);});
  Object.entries(bySec).forEach(([secId,secTasks2])=>{

    secTasks2.forEach(task=>{

      row.innerHTML=`
        <div class="plan-task-cb" style="background:${done?'var(--gr)':'var(--sf)'};border-color:${done?'var(--gr)':'var(--bds)'};">
          <svg width="10" height="7" viewBox="0 0 10 7" fill="none" style="opacity:${done?1:0};">
            <path d="M1 3.5l2.5 2.5 5.5-5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="plan-task-info">
          <div class="plan-task-label">${task.label}</div>
          <div class="plan-task-meta"><span class="plan-task-dur">${fmtMin(task.min)}</span></div>
        </div>`;
      row.onclick=()=>{
        const nowDone=!isWeekDone(task.id,planWeek);
        setWeekDone(task.id,planWeek,nowDone,person);
        row.classList.toggle('done',nowDone);
        const cb=row.querySelector('.plan-task-cb');
        cb.style.background=nowDone?'var(--gr)':'var(--sf)';cb.style.borderColor=nowDone?'var(--gr)':'var(--bds)';
        cb.querySelector('svg').style.opacity=nowDone?'1':'0';

        const p2=Math.round(tasks.filter(t=>isWeekDone(t.id,planWeek)).length/tasks.length*100);

      };

/* ── Vue synthétique style Excel ── */
function renderPlanSynth(body){
  body.className='plan-body full';
  body.style.padding='0';
  body.style.overflowY='auto';

  const allTaskDefs=[];
  ROOMS.forEach(sec=>sec.tasks.forEach(t=>allTaskDefs.push({...t,secId:sec.id,secName:sec.name,secIcon:sec.icon})));

  const freqAbbr={weekly:'H',biweekly:'2S',monthly:'M',bimonthly:'2M'};
  const WEEK_W=44; // px per week column
  const FREQ_W=36; // px freq column

  // Dynamically compute how many weeks fit in the modal width
  // Modal max is 1200px, minus padding/scrollbar ~20px, minus task col (~260px), minus freq col
  // We show at minimum 16 weeks (full 2-month cycle), scrollable
  const N_WEEKS=24; // 2 back + 22 forward = covers full 2-month cycle with room

  const weeks=[];
  let wk=currentWeekKey();
  for(let i=0;i<2;i++) wk=prevWeekKey(wk);
  for(let i=0;i<N_WEEKS;i++){weeks.push(wk);wk=nextWeekKey(wk);}

  let html=`
  <div style="overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 200px);width:100%;">
  <table style="border-collapse:collapse;table-layout:fixed;width:max-content;min-width:100%;">
    <colgroup>
      <col style="width:auto;min-width:200px;">
      <col style="width:${FREQ_W}px;">
      ${weeks.map(()=>`<col style="width:${WEEK_W}px;">`).join('')}
    </colgroup>
    <thead>
      <tr style="background:var(--bg);">
        <th style="text-align:left;padding:8px 10px 8px 1.25rem;border-bottom:2px solid var(--bd);font-size:10px;color:var(--tx3);font-weight:600;position:sticky;left:0;z-index:11;background:var(--bg);white-space:nowrap;">Tâche</th>
        <th style="text-align:center;padding:8px 4px;border-bottom:2px solid var(--bd);font-size:10px;color:var(--tx3);font-weight:600;position:sticky;left:0;z-index:11;background:var(--bg);" id="synth-freq-th">Fréq.</th>`;

  weeks.forEach(w=>{
    const isCur=w===currentWeekKey();
    html+=`<th style="text-align:center;padding:5px 1px;border-bottom:2px solid ${isCur?'var(--gr)':'var(--bd)'};font-size:9px;color:${isCur?'var(--gr)':'var(--tx3)'};font-weight:${isCur?700:500};background:${isCur?'var(--grl)':'var(--bg)'};white-space:nowrap;">
      ${weekLabel(w).split(' ')[0]}<br><span style="font-size:7.5px;opacity:.65;">${weekLabel(w).split(' ')[1]}</span>
    </th>`;
  });
  html+='</tr></thead><tbody>';

  let lastSec='';
  allTaskDefs.forEach(task=>{
    if(task.secId!==lastSec){
      lastSec=task.secId;
      const sec=ROOMS.find(r=>r.id===task.secId);
      html+=`<tr>
        <td colspan="${weeks.length+2}" style="padding:8px 10px 3px 1.25rem;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);background:var(--s2);position:sticky;left:0;white-space:nowrap;">${sec?.icon||''} ${sec?.name||task.secId}</td>
      </tr>`;
    }

    html+=`<tr style="border-bottom:1px solid var(--bd);">
      <td style="padding:5px 10px 5px 1.25rem;position:sticky;left:0;background:var(--sf);font-size:12px;color:var(--tx);white-space:nowrap;z-index:5;">${task.label}</td>
      <td style="text-align:center;padding:4px 2px;background:var(--sf);font-size:9px;font-weight:600;color:var(--tx3);border-left:1px solid var(--bd);border-right:1px solid var(--bd);white-space:nowrap;">${freqAbbr[task.frequency]||'?'}</td>`;

    weeks.forEach(w=>{
      const{week}=parseWeekKey(w);
      const scheduled=isScheduledThisWeek(task,week);
      const owner=scheduled?taskOwnerForWeek(task,week):null;
      const done=scheduled&&isWeekDone(task.id,w);
      const isCur=w===currentWeekKey();

      let bg,txt,txtCol,outline='';
      if(!scheduled){
        bg='var(--s2)';txt='';txtCol='';
      } else if(done){
        bg='var(--grl)';txt='✓';txtCol='var(--gr)';
      } else if(owner==='loic'){
        bg='rgba(27,75,135,.1)';txt='L';txtCol='#1b4b87';
      } else {
        bg='rgba(176,122,44,.1)';txt='P';txtCol='#b07a2c';
      }
      if(isCur) outline='outline:2px solid var(--gr);outline-offset:-2px;position:relative;z-index:1;';

      html+=`<td style="text-align:center;padding:3px 1px;background:${bg};border-left:1px solid var(--bd);${outline}">
        <span style="font-size:11px;font-weight:700;color:${txtCol};">${txt}</span>
      </td>`;
    });
    html+='</tr>';
  });

  html+=`</tbody></table></div>`;

  // Legend
  html+=`<div style="display:flex;gap:12px;flex-wrap:wrap;padding:.625rem 1.25rem;border-top:1px solid var(--bd);font-size:10px;color:var(--tx3);background:var(--sf);flex-shrink:0;">
    <span><b style="color:#1b4b87;">L</b> = Loïc</span>
    <span><b style="color:#b07a2c;">P</b> = Perrine</span>
    <span style="color:var(--gr);">✓ Fait</span>
    <span style="opacity:.4;">— Non prévu</span>
    <span style="margin-left:auto;font-style:italic;opacity:.6;">H=Hebdo · 2S=Bi-mensuel · M=Mensuel · 2M=2 mois · Colonne verte = semaine actuelle</span>
  </div>`;

  body.innerHTML=html;

  // After render: measure task column width and align freq column
  requestAnimationFrame(()=>{
    const taskTds=body.querySelectorAll('tbody td:first-child');
    let maxW=0;
    taskTds.forEach(td=>{maxW=Math.max(maxW,td.scrollWidth);});
    if(maxW>0){
      // Set freq col sticky left = task col width
      body.querySelectorAll('thead th:nth-child(2), tbody td:nth-child(2)').forEach(el=>{
        el.style.left=maxW+'px';
      });
    }
    // Scroll to show current week (col index 2 = first data col, +2 for task+freq)
    const curColIdx=2+2; // 2 weeks back
    const scrollEl=body.querySelector('div[style*="overflow-x"]');
    if(scrollEl) scrollEl.scrollLeft=Math.max(0,(curColIdx-1)*WEEK_W - 20);
  });
}

/* ── Historique with expandable weeks ── */
function renderPlanHist(body){
  body.className='plan-body full';
  body.style.padding='1.25rem';
  body.style.overflowY='auto';
  const weeks=getLastNWeeks(12).reverse();

  if(!weeks.some(wk=>Object.keys(mst.checks?.[wk]||{}).length>0)){
    const em=document.createElement('div');em.className='empty';
    em.innerHTML='<span class="empty-icon">📋</span><div class="empty-title">Aucun historique</div><div class="empty-sub">Commence à cocher des tâches dans le planning pour voir l\'historique ici.</div>';
    body.appendChild(em);return;
  }

  weeks.forEach(wk=>{
    const checks=mst.checks?.[wk]||{};
    const tasks=getWeekTasks(wk);
    const isCur=wk===currentWeekKey();
    const totalDone=tasks.filter(t=>checks[t.id]).length;
    const total=tasks.length;
    if(total===0)return;

    const card=document.createElement('div');card.className='hist-week';
    card.style.borderLeft=isCur?'3px solid var(--gr)':'';
    const loicT=tasks.filter(t=>t.owner==='loic');
    const perrineT=tasks.filter(t=>t.owner==='perrine');
    const loicDone=loicT.filter(t=>checks[t.id]).length;
    const perrineDone=perrineT.filter(t=>checks[t.id]).length;

    const hdr=document.createElement('div');hdr.className='hist-week-hdr';
    hdr.innerHTML=`
      <span class="hist-week-label">${weekLabel(wk)}${isCur?' <span style="font-size:10px;background:var(--grl);color:var(--gr);padding:1px 6px;border-radius:99px;font-weight:600;">Actuelle</span>':''}</span>
      <span style="font-size:11px;color:var(--tx3);">${totalDone}/${total} tâches</span>
      <span style="font-size:11px;display:flex;align-items:center;gap:4px;margin-left:8px;"><span style="width:8px;height:8px;border-radius:50%;background:#1b4b87;display:inline-block"></span>L: ${loicDone}/${loicT.length}</span>
      <span style="font-size:11px;display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:#b07a2c;display:inline-block"></span>P: ${perrineDone}/${perrineT.length}</span>
      ${total>0?`<div style="width:72px;height:4px;background:var(--bd);border-radius:99px;overflow:hidden;margin-left:8px;"><div style="width:${Math.round(totalDone/total*100)}%;height:100%;background:${totalDone===total?'var(--gr)':'var(--am)'};border-radius:99px;"></div></div>`:''}
      <span style="margin-left:auto;font-size:11px;color:var(--tx3);">▾</span>`;

    // Expandable task list
    const taskList=document.createElement('div');taskList.style.cssText='display:none;border-top:1px solid var(--bd);';
    let expanded=false;

    // Group by person
    ['loic','perrine'].forEach(person=>{
      const personTasks=tasks.filter(t=>t.owner===person);
      if(!personTasks.length)return;
      const personHdr=document.createElement('div');
      personHdr.style.cssText=`padding:6px 13px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:${person==='loic'?'#1b4b87':'#b07a2c'};background:var(--s2);`;
      personHdr.textContent=(person==='loic'?'👤 Loïc':'👤 Perrine');
      taskList.appendChild(personHdr);

      personTasks.forEach(task=>{
        const done=!!checks[task.id];
        const row=document.createElement('div');
        row.style.cssText=`display:flex;align-items:center;gap:8px;padding:7px 13px;border-bottom:1px solid var(--bd);background:${done?'var(--grl)':'var(--sf)'};${isCur?'cursor:pointer;':''}`; 
        row.innerHTML=`
          <span style="font-size:16px;">${done?'✅':'❌'}</span>
          <div style="flex:1;">
            <div style="font-size:12.5px;color:var(--tx);${done?'text-decoration:line-through;color:var(--tx3);':''}">${task.label}</div>
            <div style="font-size:10px;color:var(--tx3);">${task.secIcon} ${task.secName} · ${fmtMin(task.min)}</div>
          </div>
          ${done?'<span style="font-size:10px;color:var(--gr);font-weight:600;">Fait ✓</span>':'<span style="font-size:10px;color:var(--rd);">À faire</span>'}`;
        // Allow checking from current week history
        if(isCur){
          row.onclick=()=>{
            const nowDone=!isWeekDone(task.id,wk);
            setWeekDone(task.id,wk,nowDone,person);
            row.style.background=nowDone?'var(--grl)':'var(--sf)';
            row.querySelector('span:first-child').textContent=nowDone?'✅':'❌';
            row.querySelector('div div:first-child').style.textDecoration=nowDone?'line-through':'none';
            row.querySelector('div div:first-child').style.color=nowDone?'var(--tx3)':'var(--tx)';
            row.querySelector('span:last-child').textContent=nowDone?'Fait ✓':'À faire';
            row.querySelector('span:last-child').style.color=nowDone?'var(--gr)':'var(--rd)';
          };
        }
        taskList.appendChild(row);
      });
    });

    hdr.onclick=()=>{
      expanded=!expanded;
      taskList.style.display=expanded?'block':'none';
      hdr.querySelector('span:last-child').textContent=expanded?'▴':'▾';
    };
    card.appendChild(hdr);
    card.appendChild(taskList);
    body.appendChild(card);
  });
}

function renderPlanCharge(body){
  body.className='plan-body full';
  body.style.padding='1.25rem';
  body.style.overflowY='auto';
  const weeks=getLastNWeeks(8);

  let loicTotalMin=0,perrineTotalMin=0,loicDoneMin=0,perrineDoneMin=0;
  weeks.forEach(wk=>{
    const checks=mst.checks?.[wk]||{};
    getWeekTasks(wk).forEach(t=>{
      if(t.owner==='loic'){loicTotalMin+=t.min;if(checks[t.id])loicDoneMin+=t.min;}
      else{perrineTotalMin+=t.min;if(checks[t.id])perrineDoneMin+=t.min;}
    });
  });
  const totalMin=loicTotalMin+perrineTotalMin;
  const loicShare=totalMin>0?Math.round(loicTotalMin/totalMin*100):50;
  const diff=Math.abs(loicTotalMin-perrineTotalMin);
  const balanced=diff<=30;

  const grid=document.createElement('div');grid.className='charge-grid';
  grid.innerHTML=`
    <div class="charge-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:.5rem;"><span style="width:10px;height:10px;border-radius:50%;background:#1b4b87;flex-shrink:0;display:inline-block"></span><div class="charge-name">Loïc</div></div>
      <div class="charge-big">${fmtMin(loicTotalMin)}</div>
      <div class="charge-sub">assignées sur 8 semaines · ${loicShare}% du total</div>
      <div style="margin-top:8px;font-size:12px;color:var(--tx2);">${loicDoneMin>0?'✓ '+fmtMin(loicDoneMin)+' effectuées ('+Math.round(loicDoneMin/loicTotalMin*100)+'%)':'Aucune tâche cochée encore'}</div>
    </div>
    <div class="charge-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:.5rem;"><span style="width:10px;height:10px;border-radius:50%;background:#b07a2c;flex-shrink:0;display:inline-block"></span><div class="charge-name">Perrine</div></div>
      <div class="charge-big">${fmtMin(perrineTotalMin)}</div>
      <div class="charge-sub">assignées sur 8 semaines · ${100-loicShare}% du total</div>
      <div style="margin-top:8px;font-size:12px;color:var(--tx2);">${perrineDoneMin>0?'✓ '+fmtMin(perrineDoneMin)+' effectuées ('+Math.round(perrineDoneMin/perrineTotalMin*100)+'%)':'Aucune tâche cochée encore'}</div>
    </div>`;
  body.appendChild(grid);

  const balCard=document.createElement('div');
  balCard.style.cssText='background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;margin-bottom:1rem;';
  balCard.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="font-size:13px;font-weight:600;">Répartition globale — 8 dernières semaines</span>
      <span style="font-size:12px;color:${balanced?'var(--gr)':'var(--am)'};font-weight:600;background:${balanced?'var(--grl)':'var(--aml)'};padding:3px 9px;border-radius:99px;">${balanced?'⚖️ Équilibré':'⚠️ Écart '+fmtMin(diff)}</span>
    </div>
    <div class="charge-bar-bg"><div class="charge-bar-loic" style="width:${loicShare}%"></div><div class="charge-bar-perrine" style="width:${100-loicShare}%"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--tx3);">
      <span>● Loïc ${loicShare}%</span><span>● Perrine ${100-loicShare}%</span>
    </div>`;
  body.appendChild(balCard);

  // Week chart
  const chartCard=document.createElement('div');chartCard.style.cssText='background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;';
  chartCard.innerHTML='<div style="font-size:13px;font-weight:600;margin-bottom:.75rem;">Semaine par semaine</div>';
  const maxMin=Math.max(...weeks.map(wk=>{const t=getWeekTasks(wk);return Math.max(t.filter(x=>x.owner==='loic').reduce((a,x)=>a+x.min,0),t.filter(x=>x.owner==='perrine').reduce((a,x)=>a+x.min,0));}),1);
  weeks.forEach(wk=>{
    const tasks=getWeekTasks(wk);const checks=mst.checks?.[wk]||{};
    const lMin=tasks.filter(t=>t.owner==='loic').reduce((a,t)=>a+t.min,0);
    const pMin=tasks.filter(t=>t.owner==='perrine').reduce((a,t)=>a+t.min,0);
    const lDone=tasks.filter(t=>t.owner==='loic'&&checks[t.id]).reduce((a,t)=>a+t.min,0);
    const pDone=tasks.filter(t=>t.owner==='perrine'&&checks[t.id]).reduce((a,t)=>a+t.min,0);
    const isCur=wk===currentWeekKey();
    const row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:8px;';
    row.innerHTML=`
      <span style="font-size:10px;color:${isCur?'var(--gr)':'var(--tx3)'};min-width:42px;text-align:right;font-weight:${isCur?700:400};">${weekLabel(wk).split(' ')[0]}</span>
      <div style="flex:1;">
        <div style="display:flex;height:12px;border-radius:3px;overflow:hidden;margin-bottom:3px;">
          <div style="width:${Math.round(lMin/maxMin*100)}%;background:${isCur?'#1b4b87':'rgba(27,75,135,.35)'};border-radius:3px;position:relative;">
            ${lDone>0&&lMin>0?`<div style="width:${Math.round(lDone/lMin*100)}%;height:100%;background:#1b4b87;"></div>`:''}
          </div>
        </div>
        <div style="display:flex;height:12px;border-radius:3px;overflow:hidden;">
          <div style="width:${Math.round(pMin/maxMin*100)}%;background:${isCur?'#b07a2c':'rgba(176,122,44,.35)'};border-radius:3px;position:relative;">
            ${pDone>0&&pMin>0?`<div style="width:${Math.round(pDone/pMin*100)}%;height:100%;background:#b07a2c;"></div>`:''}
          </div>
        </div>
      </div>
      <div style="font-size:10px;color:var(--tx3);min-width:80px;"><div>L: ${fmtMin(lMin)}</div><div>P: ${fmtMin(pMin)}</div></div>`;
    chartCard.appendChild(row);
  });
  const leg=document.createElement('div');leg.style.cssText='display:flex;gap:12px;margin-top:8px;font-size:10px;color:var(--tx3);flex-wrap:wrap;';
  leg.innerHTML='<span><span style="display:inline-block;width:10px;height:10px;background:#1b4b87;border-radius:2px;margin-right:3px;"></span>Loïc</span><span><span style="display:inline-block;width:10px;height:10px;background:#b07a2c;border-radius:2px;margin-right:3px;"></span>Perrine</span><span style="margin-left:auto;font-style:italic;font-size:9px;">Clair = assigné · Foncé = effectué</span>';
  chartCard.appendChild(leg);
  body.appendChild(chartCard);
}

/* ═══ RENDER ALL ═══ */

function renderAll(){
  try{
    renderProfiles();
    renderSidebar();
    renderContent();
    updateUI();
  }catch(e){console.error('renderAll error:',e);}
}

/* ═══ INIT ═══ */
function appInit(){
  loadRoot();
  st=loadP(root.active);
  mst=loadMst();
  activeRoom=ROOMS[0].id;
  document.getElementById('tbHEFields').style.display='none';
  document.getElementById('cdBanner').style.display='none';
  document.getElementById('abarHE').style.display='none';
  document.getElementById('sidebarHE').style.display='none';
  syncFields();
  renderAll();
  document.getElementById('fieldName').addEventListener('input',e=>{st['meta_name']=e.target.value;saveP();document.title=(e.target.value||'Ménage')+'— Planning';});
  document.getElementById('fieldDate').addEventListener('change',e=>{st['meta_date']=e.target.value;saveP();updateCountdownBanner();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeCeleb();closeDashboard();closeEffortModal();closePlanning();}});
  // Show sync status in topbar
  if(!window._fbOffline){
    const ind=document.createElement('div');
    ind.id='fbIndicator';
    ind.style.cssText='font-size:10px;color:var(--gr);display:flex;align-items:center;gap:4px;flex-shrink:0;';
    ind.innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:var(--gr);display:inline-block;"></span>Sync activée';
    const tb=document.querySelector('.topbar');
    if(tb)tb.appendChild(ind);
  }
}

// Wait for Firebase to be ready before initializing
if(window._fbReady){
  appInit();
} else {
  window._fbInitCallback=appInit;
  // Safety timeout — init anyway after 3s even if Firebase is slow
  setTimeout(()=>{if(!window._fbReady){window._fbOffline=true;window._fbReady=true;appInit();}},3000);
}
</script>
