let inlineWeek=null;
function shiftInlineWeek(dir){
  if(!inlineWeek)inlineWeek=currentWeekKey();
  archiveWeek(inlineWeek);
  inlineWeek=dir<0?prevWeekKey(inlineWeek):nextWeekKey(inlineWeek);
  const area=document.getElementById('content');area.innerHTML='';
  renderInlineWeekPlanning(area);
}

function renderInlineWeekPlanning(area){
  const wk=inlineWeek||currentWeekKey();
  const isCurrent=wk===currentWeekKey();
  const tasks=getWeekTasks(wk);
  const loicTasks=tasks.filter(t=>t.owner==='loic');
  const perrineTasks=tasks.filter(t=>t.owner==='perrine');
  const loicMin=loicTasks.reduce((a,t)=>a+t.min,0);
  const perrineMin=perrineTasks.reduce((a,t)=>a+t.min,0);
  const totalMin=loicMin+perrineMin;
  const totalDone=tasks.filter(t=>isWeekDone(t.id,wk)).length;

  // ── Week header ──
  const wkHdr=document.createElement('div');
  wkHdr.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap;';
  const loicPct=totalMin>0?Math.round(loicMin/totalMin*100):50;
  const diff=Math.abs(loicMin-perrineMin);
  const bal=diff<=BALANCE_THRESHOLD_WEEK;
  wkHdr.innerHTML=`
    <div style="flex:1;min-width:0;">
      <div style="font-family:'Fraunces',serif;font-size:22px;font-weight:500;letter-spacing:-.3px;display:flex;align-items:center;gap:8px;">
        ${weekLabel(wk)}
        ${isCurrent?'<span style="font-size:10px;background:var(--grl);color:var(--gr);padding:2px 8px;border-radius:99px;font-weight:700;">Actuelle</span>':''}
      </div>
      <div style="font-size:12px;color:var(--tx3);margin-top:2px;">
        ${totalDone}/${tasks.length} tâches cochées · ${fmtMin(tasks.filter(t=>!isWeekDone(t.id,wk)).reduce((a,t)=>a+t.min,0))} restantes
      </div>
    </div>
    <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">
      <button onclick="shiftInlineWeek(-1)" style="width:32px;height:32px;border-radius:99px;border:1px solid var(--bdm);background:var(--sf);color:var(--tx2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">‹</button>
      ${!isCurrent?`<button onclick="inlineWeek=null;const a=document.getElementById('content');a.innerHTML='';renderInlineWeekPlanning(a);" style="padding:5px 12px;border-radius:99px;border:1px solid var(--grm);background:var(--grl);color:var(--gr);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;">Aujourd'hui</button>`:''}
      <button onclick="shiftInlineWeek(1)" style="width:32px;height:32px;border-radius:99px;border:1px solid var(--bdm);background:var(--sf);color:var(--tx2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">›</button>
    </div>`;
  area.appendChild(wkHdr);

  // ── Balance bar ──
  if(totalMin>0){
    const balDiv=document.createElement('div');
    balDiv.style.cssText='background:var(--sf);border:1px solid var(--bd);border-radius:var(--rsm);padding:.625rem 1rem;margin-bottom:1.25rem;';
    balDiv.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-size:11px;font-weight:600;color:var(--tx);">Équilibre de charge</span>
        <span style="font-size:11px;color:${bal?'var(--gr)':'var(--am)'};font-weight:600;background:${bal?'var(--grl)':'var(--aml)'};padding:2px 8px;border-radius:99px;">${bal?'⚖️ Équilibré':'⚠️ Écart '+fmtMin(diff)}</span>
      </div>
      <div style="display:flex;height:8px;border-radius:99px;overflow:hidden;margin-bottom:5px;">
        <div style="width:${loicPct}%;background:#1b4b87;border-radius:99px 0 0 99px;transition:width .4s;"></div>
        <div style="flex:1;background:#b07a2c;border-radius:0 99px 99px 0;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);">
        <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#1b4b87;margin-right:4px;vertical-align:middle;"></span>Loïc · ${fmtMin(loicMin)} (${loicPct}%)</span>
        <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#b07a2c;margin-right:4px;vertical-align:middle;"></span>Perrine · ${fmtMin(perrineMin)} (${100-loicPct}%)</span>
      </div>`;
    area.appendChild(balDiv);
  }

  // ── Two columns using plan-col CSS classes ──
  const grid=document.createElement('div');
  grid.className='inline-week-grid';

  function buildPersonCol(person, personTasks, color){
    const col=document.createElement('div');col.className='plan-col';
    const done=personTasks.filter(t=>isWeekDone(t.id,wk)).length;
    const minTotal=personTasks.reduce((a,t)=>a+t.min,0);
    const minDone=personTasks.filter(t=>isWeekDone(t.id,wk)).reduce((a,t)=>a+t.min,0);
    const pct=personTasks.length>0?Math.round(done/personTasks.length*100):0;
    const colPctId='ipct-'+person;
    const colMetaId='imeta-'+person;

    // Header
    const hdr=document.createElement('div');
    hdr.className='plan-col-hdr';
    hdr.style.borderBottom=`2px solid ${color}`;
    hdr.innerHTML=`
      <div style="width:36px;height:36px;border-radius:99px;background:${color}18;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">👤</div>
      <div style="flex:1;">
        <div class="plan-col-name">${person==='loic'?'Loïc':'Perrine'}</div>
        <div id="${colMetaId}" class="plan-col-meta">${done}/${personTasks.length} tâches · ${fmtMin(minDone)} / ${fmtMin(minTotal)}</div>
      </div>
      <div id="${colPctId}" style="font-family:'Fraunces',serif;font-size:26px;font-weight:600;color:${pct===100?'var(--gr)':color};line-height:1;">${pct}%</div>`;
    col.appendChild(hdr);

    if(personTasks.length===0){
      const em=document.createElement('div');em.className='empty';em.style.paddingTop='1.5rem';
      em.innerHTML='<span class="empty-icon">✅</span><div class="empty-title" style="font-size:14px;">Rien cette semaine !</div>';
      col.appendChild(em);return col;
    }

    // Group by section
    const bySec={};
    personTasks.forEach(t=>{if(!bySec[t.secId])bySec[t.secId]=[];bySec[t.secId].push(t);});
    Object.entries(bySec).forEach(([secId,sts])=>{
      const secLbl=document.createElement('div');
      secLbl.className='global-sec-label';
      secLbl.style.cssText='font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);margin:10px 0 4px;';
      secLbl.textContent=sts[0].secIcon+' '+sts[0].secName;
      col.appendChild(secLbl);

      sts.forEach(task=>{
        const row=buildPlanTaskRow(task,wk,person,(t,nowDone)=>{
          const d2=personTasks.filter(t=>isWeekDone(t.id,wk)).length;
          const m2=personTasks.filter(t=>isWeekDone(t.id,wk)).reduce((a,t)=>a+t.min,0);
          const p2=personTasks.length>0?Math.round(d2/personTasks.length*100):0;
          const pctEl=document.getElementById(colPctId);
          if(pctEl){pctEl.textContent=p2+'%';pctEl.style.color=p2===100?'var(--gr)':color;}
          const metaEl=document.getElementById(colMetaId);
          if(metaEl)metaEl.textContent=d2+'/'+personTasks.length+' tâches · '+fmtMin(m2)+' / '+fmtMin(minTotal);
        });
        col.appendChild(row);
      });
    });
    return col;
  }

  function applyWeekFilter(tasks){
    if(filter==='all') return tasks;
    if(filter==='done') return tasks.filter(t=>isWeekDone(t.id,wk));
    if(filter==='pending') return tasks.filter(t=>!isWeekDone(t.id,wk));
    if(filter==='e1') return tasks.filter(t=>(st['ef_'+t.id]??t.effort??0)===1);
    if(filter==='e2') return tasks.filter(t=>(st['ef_'+t.id]??t.effort??0)===2);
    if(filter==='e3') return tasks.filter(t=>(st['ef_'+t.id]??t.effort??0)===3);
    return tasks;
  }

  grid.appendChild(buildPersonCol('loic',applyWeekFilter(loicTasks),'#1b4b87'));
  grid.appendChild(buildPersonCol('perrine',applyWeekFilter(perrineTasks),'#b07a2c'));
  area.appendChild(grid);
}

/* ═══ UPDATE UI (counters + topbar) ═══ */
function updateUI(){
  // Scope tasks to current mode
  const modeSecs=appMode==='menage'?ROOMS:GENERAL;
  const modeTasks=[];
  modeSecs.forEach(s=>secTasks(s).forEach(t=>modeTasks.push({...t,secId:s.id})));

  let totalDone=0,totalAll=0,totalMinAll=0,totalMinDone=0;
  const cnt={all:0,pending:0,done:0,e1:0,e2:0,e3:0};

  modeTasks.forEach(t=>{
    const done=isDone(t.id);
    const m=getMin(t);
    const ef=t.effort||0;
    totalAll++;totalMinAll+=m;
    if(done){totalDone++;totalMinDone+=m;}
    cnt.all++;
    if(done)cnt.done++;else cnt.pending++;
    if(ef===1)cnt.e1++;else if(ef===2)cnt.e2++;else if(ef===3)cnt.e3++;
  });

  const pct=totalAll>0?Math.round(totalDone/totalAll*100):0;
  document.getElementById('tbPct').textContent=pct+'%';
  document.getElementById('tbBarFill').style.width=pct+'%';

  // Update all filter chip counters for the active mode — single pass, no duplication
  ['all','pending','done'].forEach(k=>{
    const elM=document.getElementById('fc-'+k);if(elM)elM.textContent=cnt[k]||'';
    const elH=document.getElementById('fc-'+k+'-he');if(elH)elH.textContent=cnt[k]||'';
  });
  ['e1','e2','e3'].forEach(k=>{
    const el=document.getElementById('fc-'+k);if(el)el.textContent=cnt[k]||'';
  });

  renderSidebar();

  if(pct===100&&totalAll>0&&!celebShown)setTimeout(()=>bigCeleb(totalDone,totalMinDone),CELEB_DELAY_MS);
  if(pct<100)celebShown=false;
}

function makeSVGDonut(pct,done,total,color,size){
  const r=52,cx=64,cy=64;
  const circ=2*Math.PI*r;
  const filled=circ*(pct/100);
  const empty=circ-filled;
  return `<svg class="db-donut-svg" width="${size}" height="${size}" viewBox="0 0 128 128">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--bd)" stroke-width="14"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
      stroke="${color}" stroke-width="14"
      stroke-dasharray="${filled} ${empty}"
      stroke-dashoffset="${circ/4}"
      stroke-linecap="round"
      style="transition:stroke-dasharray .6s cubic-bezier(.4,0,.2,1)"/>
    <text x="${cx}" y="${cy-8}" text-anchor="middle" font-family="Fraunces,serif" font-size="22" font-weight="600" fill="var(--tx)">${pct}%</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="var(--tx3)">${done}/${total}</text>
    <text x="${cx}" y="${cy+26}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="var(--tx3)">tâches</text>
  </svg>`;
}

function calcSecStats(sec){
  const tasks=secTasks(sec);
  const total=tasks.length;
  const done=tasks.filter(t=>isDone(t.id)).length;
  const pct=total>0?Math.round(done/total*100):0;
  const pending=tasks.filter(t=>!isDone(t.id));
  const e1=pending.filter(t=>t.effort===1).length;
  const e2=pending.filter(t=>t.effort===2).length;
  const e3=pending.filter(t=>t.effort===3).length;
  const timeLeft=pending.reduce((a,t)=>a+getMin(t),0);
  return{total,done,pct,e1,e2,e3,timeLeft,pending};
}

}

    ? fmtMin(tasks.reduce((a,t)=>a+t.min,0))

  body.innerHTML='';
  tasks.forEach(task=>{

    const row=document.createElement('div');
    row.className='ef-task-row'+(done?' done-row':'');
    row.innerHTML=`
      <div class="ef-task-cb" aria-hidden="true" style="background:${done?'var(--gr)':'var(--sf)'};border-color:${done?'var(--gr)':'var(--bds)'};">
        <svg width="10" height="7" viewBox="0 0 10 7" fill="none" style="opacity:${done?1:0}">

/* ═══ PLANNING UI ═══ */
let planTab='week';
let planWeek=currentWeekKey();

function openPlanning(tab){
  planWeek=currentWeekKey();
  document.getElementById('planOv').classList.add('on');
  if(tab) switchPlanTab(tab);
  else renderPlanning();
  trapFocus(document.querySelector('.plan-modal'));
}
function closePlanning(){
  archiveWeek(planWeek);
  document.getElementById('planOv').classList.remove('on');
}
function switchPlanTab(tab){
  planTab=tab;
  ['week','loic','perrine','synth','annual','hist','charge'].forEach(t=>{
    const el=document.getElementById('planTab'+t.charAt(0).toUpperCase()+t.slice(1));
    if(el)el.classList.toggle('active',t===tab);
  });
  const showNav=['week','loic','perrine'].includes(tab);
  document.getElementById('planWeekNav').style.display=showNav?'flex':'none';
  renderPlanning();
}
function navPlanWeek(dir){
  archiveWeek(planWeek);
  planWeek=dir<0?prevWeekKey(planWeek):nextWeekKey(planWeek);
  renderPlanning();
}
function goTodayWeek(){archiveWeek(planWeek);planWeek=currentWeekKey();renderPlanning();}

function renderPlanning(){
  const body=document.getElementById('planBody');
  body.innerHTML='';
  document.getElementById('planWeekLabel').textContent=weekLabel(planWeek);
  const isCurrent=planWeek===currentWeekKey();
  if(planTab==='week') renderPlanGlobal(body);
  else if(planTab==='loic') renderPlanPerson(body,'loic','👤','#1b4b87');
  else if(planTab==='perrine') renderPlanPerson(body,'perrine','👤','#b07a2c');
  else if(planTab==='synth') renderPlanSynth(body);
  else if(planTab==='annual') renderPlanAnnual(body);
  else if(planTab==='hist') renderPlanHist(body);
  else renderPlanCharge(body);
}

/* ── Synthèse année courante ── */
let synthYear=new Date().getFullYear();

function renderPlanSynth(body){
  body.className='plan-body full';
  body.style.padding='0';
  body.style.overflowY='hidden';

  const allTaskDefs=[];
  ROOMS.forEach(sec=>sec.tasks.forEach(t=>allTaskDefs.push({...t,secId:sec.id,secName:sec.name,secIcon:sec.icon})));

  const freqAbbr={weekly:'H',biweekly:'2S',monthly:'M',bimonthly:'2M'};
  const WEEK_W=44;
  const FREQ_W=32;
  const curWk=currentWeekKey();
  const curYear=new Date().getFullYear();

  // Generate all weeks of selected year (ISO weeks)
  function getYearWeeks(year){
    const weeks=[];
    // Find S01 of the year
    let d=new Date(year,0,4); // Jan 4 is always in week 1
    const{week:firstWeek}=isoWeek(d);
    // Start from W01
    let wk=year+'W01';
    // Generate up to 53 weeks
    for(let i=0;i<54;i++){
      const{year:wy,week:wn}=parseWeekKey(wk);
      if(wy>year) break; // stop when we cross into next year
      weeks.push(wk);
      wk=nextWeekKey(wk);
    }
    return weeks;
  }

  const weeks=getYearWeeks(synthYear);
  const minYear=2025;
  const maxYear=2040;

  // ── Year selector bar ──
  const yearBar=document.createElement('div');
  yearBar.style.cssText='display:flex;align-items:center;gap:10px;padding:.625rem 1.25rem;border-bottom:1px solid var(--bd);background:var(--sf);flex-shrink:0;';
  yearBar.innerHTML=`
    <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);">Année</span>
    <div style="display:flex;align-items:center;gap:6px;">
      <button onclick="if(synthYear>${minYear}){synthYear--;renderPlanning();}" style="width:28px;height:28px;border-radius:99px;border:1px solid var(--bdm);background:var(--sf);color:var(--tx2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;">‹</button>
      <span style="font-family:'Fraunces',serif;font-size:18px;font-weight:500;min-width:50px;text-align:center;">${synthYear}</span>
      <button onclick="if(synthYear<${maxYear}){synthYear++;renderPlanning();}" style="width:28px;height:28px;border-radius:99px;border:1px solid var(--bdm);background:var(--sf);color:var(--tx2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;">›</button>
    </div>
    <span style="font-size:11px;color:var(--tx3);">${weeks.length} semaines · ${synthYear===curYear?'<span style="color:var(--gr);font-weight:600;">Année en cours</span>':synthYear>curYear?'🔮 Projection':'📦 Historique'}</span>
    <span style="margin-left:auto;font-size:10px;color:var(--tx3);">${minYear} — ${maxYear}</span>`;
  body.appendChild(yearBar);

  // ── Table ──
  let html=`
  <div style="overflow-x:auto;overflow-y:auto;flex:1;width:100%;">
  <table style="border-collapse:collapse;table-layout:fixed;width:max-content;min-width:100%;">
    <colgroup>
      <col style="width:auto;min-width:180px;">
      <col style="width:${FREQ_W}px;">
      ${weeks.map(w=>`<col style="width:${WEEK_W}px;">`).join('')}
    </colgroup>
    <thead>
      <tr style="background:var(--bg);">
        <th style="text-align:left;padding:8px 10px 8px 1.25rem;border-bottom:2px solid var(--bd);font-size:10px;color:var(--tx3);font-weight:600;position:sticky;left:0;z-index:11;background:var(--bg);white-space:nowrap;">Tâche</th>
        <th style="text-align:center;padding:8px 4px;border-bottom:2px solid var(--bd);font-size:10px;color:var(--tx3);font-weight:600;position:sticky;left:0;z-index:11;background:var(--bg);">Fréq.</th>`;

  weeks.forEach(w=>{
    const isCur=w===curWk;
    const isPast=w<curWk;
    html+=`<th style="text-align:center;padding:5px 1px;border-bottom:2px solid ${isCur?'var(--gr)':'var(--bd)'};font-size:9px;color:${isCur?'var(--gr)':isPast?'var(--tx3)':'var(--tx2)'};font-weight:${isCur?700:400};background:${isCur?'var(--grl)':isPast?'var(--s2)':'var(--bg)'};white-space:nowrap;opacity:${isPast?0.6:1};">
      ${weekLabel(w).split(' ')[0]}<br><span style="font-size:7px;opacity:.6;">${weekLabel(w).split(' ')[1]}</span>
    </th>`;
  });
  html+='</tr></thead><tbody>';

  let lastSec='';
  allTaskDefs.forEach(task=>{
    if(task.secId!==lastSec){
      lastSec=task.secId;
      const sec=ROOMS.find(r=>r.id===task.secId);
      html+=`<tr><td colspan="${weeks.length+2}" style="padding:8px 10px 3px 1.25rem;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);background:var(--s2);position:sticky;left:0;white-space:nowrap;">${sec?.icon||''} ${sec?.name||task.secId}</td></tr>`;
    }

    html+=`<tr style="border-bottom:1px solid var(--bd);">
      <td style="padding:5px 10px 5px 1.25rem;position:sticky;left:0;background:var(--sf);z-index:5;">
        <div style="font-size:11.5px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;">${task.label}</div>
        <div style="font-size:9px;color:var(--tx3);margin-top:1px;">${fmtMin(getMin(task))} · ${{0:'—',1:'🟢',2:'🟡',3:'🔴'}[st['ef_'+task.id]??task.effort??0]}</div>
      </td>
      <td style="text-align:center;padding:3px 2px;background:var(--sf);font-size:9px;font-weight:600;color:var(--tx3);border-left:1px solid var(--bd);border-right:1px solid var(--bd);">${freqAbbr[task.frequency]||'?'}</td>`;

    weeks.forEach(w=>{
      const{week}=parseWeekKey(w);
      const scheduled=isScheduledThisWeek(task,week);
      const owner=scheduled?taskOwnerForWeek(task,week):null;
      const done=scheduled&&isWeekDone(task.id,w);
      const isCur=w===curWk;
      const isPast=w<curWk;

      let bg,txt,txtCol,outline='';
      if(!scheduled){
        bg=isPast?'rgba(0,0,0,.03)':'var(--s2)';txt='';txtCol='';
      } else if(done){
        bg='var(--grl)';txt='✓';txtCol='var(--gr)';
      } else if(isPast&&!done){
        // Past week, not done → show as missed
        bg='rgba(178,47,34,.06)';txt=scheduled?(owner==='loic'?'L':'P'):'';txtCol='rgba(178,47,34,.5)';
      } else if(owner==='loic'){
        bg='rgba(27,75,135,.08)';txt='L';txtCol='#1b4b87';
      } else {
        bg='rgba(176,122,44,.08)';txt='P';txtCol='#b07a2c';
      }
      if(isCur) outline='outline:2px solid var(--gr);outline-offset:-2px;position:relative;z-index:1;';

      html+=`<td style="text-align:center;padding:3px 1px;background:${bg};border-left:1px solid var(--bd);${outline}">
        <span style="font-size:10px;font-weight:700;color:${txtCol};">${txt}</span>
      </td>`;
    });
    html+='</tr>';
  });

  html+=`</tbody></table></div>`;

  // Legend
  html+=`<div style="display:flex;gap:10px;flex-wrap:wrap;padding:.5rem 1.25rem;border-top:1px solid var(--bd);font-size:10px;color:var(--tx3);background:var(--sf);flex-shrink:0;">
    <span><b style="color:#1b4b87;">L</b> Loïc</span>
    <span><b style="color:#b07a2c;">P</b> Perrine</span>
    <span style="color:var(--gr);">✓ Fait</span>
    <span style="color:rgba(178,47,34,.6);">L/P grisé = non fait (passé)</span>
    <span style="opacity:.4;">— Non prévu</span>
    <span style="margin-left:auto;font-style:italic;opacity:.6;">H=Hebdo · 2S=Bi-mensuel · M=Mensuel · 2M=2 mois</span>
  </div>`;

  const tableWrap=document.createElement('div');
  tableWrap.style.cssText='display:flex;flex-direction:column;flex:1;overflow:hidden;';
  tableWrap.innerHTML=html;
  body.appendChild(tableWrap);

  // Auto-scroll to current week
  requestAnimationFrame(()=>{
    const scrollEl=body.querySelector('div[style*="overflow-x:auto"]');
    if(scrollEl){
      const curIdx=weeks.indexOf(curWk);
      if(curIdx>=0) scrollEl.scrollLeft=Math.max(0,(curIdx-1)*WEEK_W);
    }
    // Fix freq col sticky position
    body.querySelectorAll('thead th:nth-child(2),tbody td:nth-child(2)').forEach(el=>{
      const taskTh=body.querySelector('thead th:first-child');
      if(taskTh) el.style.left=taskTh.offsetWidth+'px';
    });
  });
}

/* ── Archive annuelle ── */
function checkYearArchive(){
  const{week,year}=isoWeek(new Date());
  // Propose archive at end of year (week 50+)
  if(week<50)return;
  const archKey='arch_'+year;
  if(mst[archKey])return; // already archived
  // Show banner
  const existing=document.getElementById('archiveBanner');
  if(existing)return;
  const banner=document.createElement('div');
  banner.id='archiveBanner';
  banner.style.cssText='position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:#1b4b87;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-family:"DM Sans",sans-serif;z-index:9000;display:flex;gap:12px;align-items:center;box-shadow:0 4px 20px rgba(0,0,0,.2);max-width:calc(100vw - 2rem);';
  banner.innerHTML=`
    <span>📅 Fin d'année ${year} — Archiver le bilan ?</span>
    <button onclick="archiveYear(${year})" style="padding:5px 12px;border-radius:99px;background:#fff;color:#1b4b87;font-weight:600;font-size:12px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;">Archiver</button>
    <button onclick="document.getElementById('archiveBanner').remove()" style="background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:16px;">✕</button>`;
  document.body.appendChild(banner);
}

function archiveYear(year){
  const weeks=[];
  let wk=year+'W01';
  for(let i=0;i<54;i++){
    const{year:wy}=parseWeekKey(wk);
    if(wy>year)break;
    weeks.push(wk);wk=nextWeekKey(wk);
  }
  let loicMin=0,perrineMin=0,loicDone=0,perrineDone=0,loicTasks=0,perrineTasks=0;
  weeks.forEach(wk=>{
    const checks=mst.checks?.[wk]||{};
    getWeekTasks(wk).forEach(t=>{
      if(t.owner==='loic'){loicTasks++;loicMin+=t.min;if(checks[t.id]){loicDone++;}}
      else{perrineTasks++;perrineMin+=t.min;if(checks[t.id]){perrineDone++;}}
    });
  });
  if(!mst.archives)mst.archives={};
  mst.archives[year]={
    year,loicMin,perrineMin,loicDone,perrineDone,loicTasks,perrineTasks,
    archivedAt:Date.now()
  };
  mst['arch_'+year]=1;
  saveMst();
  document.getElementById('archiveBanner')?.remove();
  showArchiveSuccess(year,loicMin,perrineMin,loicDone+perrineDone,loicTasks+perrineTasks);
}

function showArchiveSuccess(year,lMin,pMin,done,total){
  const toast=document.createElement('div');
  toast.style.cssText='position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:var(--gr);color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-family:"DM Sans",sans-serif;z-index:9000;box-shadow:0 4px 20px rgba(0,0,0,.2);max-width:calc(100vw - 2rem);text-align:center;';
  const pct=total>0?Math.round(done/total*100):0;
  toast.innerHTML=`✅ Année ${year} archivée — ${done}/${total} tâches (${pct}%) · Loïc ${fmtMin(lMin)} / Perrine ${fmtMin(pMin)}`;
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),5000);
}

/* ── Onglet Projection annuelle ── */
function renderPlanAnnual(body){
  body.className='plan-body full';
  body.style.padding='1.25rem';
  body.style.overflowY='auto';

  const curYear=new Date().getFullYear();
  const years=Array.from({length:2040-2025+1},(_,i)=>2025+i);

  // Year tabs
  const tabWrap=document.createElement('div');
  tabWrap.style.cssText='display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;';
  years.forEach(y=>{
    const btn=document.createElement('button');
    const hasArchive=!!(mst.archives?.[y]);
    btn.style.cssText=`padding:6px 16px;border-radius:99px;border:1px solid var(--bdm);background:var(--sf);color:var(--tx2);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;`;
    btn.textContent=(y===curYear?'📅 ':y>curYear?'🔮 ':'📦 ')+y+(hasArchive?' ✓':'');

      tabWrap.querySelectorAll('button').forEach(b=>b.style.background='var(--sf)');

    };

  renderAnnualYear(body,curYear,tabWrap);

}

function renderAnnualYear(body,year,tabWrap){
  // Remove previous year content (keep tabWrap)
  const existing=body.querySelector('.annual-content');
  if(existing)existing.remove();

  const wrap=document.createElement('div');
  wrap.className='annual-content';

  const archive=mst.archives?.[year];
  const curYear=new Date().getFullYear();
  const isFuture=year>curYear;
  const isPast=year<curYear;

  // Stats cards
  const weeks=[];
  let wk=year+'W01';
  for(let i=0;i<54;i++){const{year:wy}=parseWeekKey(wk);if(wy>year)break;weeks.push(wk);wk=nextWeekKey(wk);}

  let loicMin=0,perrineMin=0,loicDone=0,perrineDone=0,loicTasks=0,perrineTasks=0;
  if(archive){
    ({loicMin,perrineMin,loicDone,perrineDone,loicTasks,perrineTasks}=archive);
  } else {
    weeks.forEach(wk=>{
      const checks=mst.checks?.[wk]||{};
      getWeekTasks(wk).forEach(t=>{
        if(t.owner==='loic'){loicTasks++;loicMin+=t.min;if(checks[t.id])loicDone++;}
        else{perrineTasks++;perrineMin+=t.min;if(checks[t.id])perrineDone++;}
      });
    });
  }

  const totalMin=loicMin+perrineMin;
  const loicPct=totalMin>0?Math.round(loicMin/totalMin*100):50;
  const donePct=loicTasks+perrineTasks>0?Math.round((loicDone+perrineDone)/(loicTasks+perrineTasks)*100):0;

  // Summary cards
  const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem;';

    <div style="background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><span style="width:8px;height:8px;border-radius:50%;background:#1b4b87;display:inline-block;"></span><span style="font-size:12px;font-weight:600;">Loïc</span></div>
      <div style="font-family:'Fraunces',serif;font-size:24px;font-weight:600;">${fmtMin(loicMin)}</div>
      <div style="font-size:11px;color:var(--tx3);margin-top:3px;">${loicPct}% du total · ${loicTasks} tâches</div>
      ${!isFuture?`<div style="font-size:11px;color:var(--gr);margin-top:5px;">✓ ${fmtMin(loicDone*loicMin/(loicTasks||1))} effectuées (${loicTasks>0?Math.round(loicDone/loicTasks*100):0}%)</div>`:'<div style="font-size:11px;color:var(--tx3);margin-top:5px;">Projection basée sur le planning</div>'}
    </div>
    <div style="background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><span style="width:8px;height:8px;border-radius:50%;background:#b07a2c;display:inline-block;"></span><span style="font-size:12px;font-weight:600;">Perrine</span></div>
      <div style="font-family:'Fraunces',serif;font-size:24px;font-weight:600;">${fmtMin(perrineMin)}</div>
      <div style="font-size:11px;color:var(--tx3);margin-top:3px;">${100-loicPct}% du total · ${perrineTasks} tâches</div>
      ${!isFuture?`<div style="font-size:11px;color:var(--gr);margin-top:5px;">✓ ${fmtMin(perrineDone*perrineMin/(perrineTasks||1))} effectuées (${perrineTasks>0?Math.round(perrineDone/perrineTasks*100):0}%)</div>`:'<div style="font-size:11px;color:var(--tx3);margin-top:5px;">Projection basée sur le planning</div>'}
    </div>`;
  wrap.appendChild(grid);

  // Balance bar
  const balDiv=document.createElement('div');
  balDiv.style.cssText='background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:.875rem;margin-bottom:1.25rem;';
  const diff=Math.abs(loicMin-perrineMin);
  const bal=diff<60; // < 1h difference over a year = balanced
  balDiv.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <span style="font-size:12px;font-weight:600;">${isFuture?'Projection':'Répartition'} ${year} — ${weeks.length} semaines</span>
      <span style="font-size:11px;font-weight:600;color:${bal?'var(--gr)':'var(--am)'};background:${bal?'var(--grl)':'var(--aml)'};padding:2px 8px;border-radius:99px;">${bal?'⚖️ Équilibré':'⚠️ Écart '+fmtMin(diff)}</span>
    </div>
    <div style="display:flex;height:10px;border-radius:99px;overflow:hidden;">
      <div style="width:${loicPct}%;background:#1b4b87;border-radius:99px 0 0 99px;"></div>
      <div style="flex:1;background:#b07a2c;border-radius:0 99px 99px 0;"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:var(--tx3);">
      <span>● Loïc ${loicPct}% · ${fmtMin(loicMin)}</span>
      <span>● Perrine ${100-loicPct}% · ${fmtMin(perrineMin)}</span>
    </div>
    ${!isFuture&&donePct>0?`<div style="margin-top:8px;height:4px;background:var(--bd);border-radius:99px;overflow:hidden;"><div style="width:${donePct}%;height:100%;background:var(--gr);border-radius:99px;"></div></div><div style="font-size:10px;color:var(--tx3);margin-top:3px;">Progression globale : ${donePct}%</div>`:''}
    ${isPast&&!archive?`<button onclick="archiveYear(${year})" style="margin-top:10px;padding:5px 14px;border-radius:99px;border:1px solid var(--grm);background:var(--grl);color:var(--gr);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">📦 Archiver ${year}</button>`:''}`;
  wrap.appendChild(balDiv);

  // Monthly breakdown chart (12 months)
  const chartTitle=document.createElement('div');
  chartTitle.style.cssText='font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);margin-bottom:8px;';
  chartTitle.textContent=isFuture?'Projection mois par mois':'Réalisation mois par mois';
  wrap.appendChild(chartTitle);

  const months=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const monthData=Array(12).fill(null).map(()=>({l:0,p:0,ld:0,pd:0}));
  weeks.forEach(wk=>{

    const approxMonth=Math.min(11,Math.floor((week-1)/4.33));
    const checks=mst.checks?.[wk]||{};
    getWeekTasks(wk).forEach(t=>{
      if(t.owner==='loic'){monthData[approxMonth].l+=t.min;if(checks[t.id])monthData[approxMonth].ld+=t.min;}
      else{monthData[approxMonth].p+=t.min;if(checks[t.id])monthData[approxMonth].pd+=t.min;}

  });

  const maxMonthMin=Math.max(...monthData.map(m=>m.l+m.p),1);

  chartCard.style.cssText='background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:.875rem;';
  months.forEach((m,i)=>{

      <div style="flex:1;">

          <div style="width:${lPct}%;background:${isCurMonth?'#1b4b87':'rgba(27,75,135,.35)'};border-radius:3px;overflow:hidden;">
            ${!isFuture&&lDonePct>0?`<div style="width:${lDonePct}%;height:100%;background:#1b4b87;"></div>`:''}
          </div>
        </div>
        <div style="display:flex;gap:2px;height:10px;border-radius:3px;overflow:hidden;">
          <div style="width:${pPct}%;background:${isCurMonth?'#b07a2c':'rgba(176,122,44,.35)'};border-radius:3px;overflow:hidden;">
            ${!isFuture&&pDonePct>0?`<div style="width:${pDonePct}%;height:100%;background:#b07a2c;"></div>`:''}
          </div>
        </div>
      </div>
      <div style="font-size:9px;color:var(--tx3);min-width:70px;text-align:right;">
        L:${fmtMin(l)} P:${fmtMin(p)}
      </div>`;
    chartCard.appendChild(row);
  });
  wrap.appendChild(chartCard);

  body.appendChild(wrap);
}
/* ── Historique with expandable weeks ── */
function renderPlanHist(body){
  body.className='plan-body full';
  body.style.padding='1.25rem';
  body.style.overflowY='auto';
  const weeks=getLastNWeeks(12).reverse();

  if(!weeks.some(wk=>Object.keys(mst.checks?.[wk]||{}).length>0)){
    const em=document.createElement('div');em.className='empty';
    em.innerHTML='<span class="empty-icon">📋</span><div class="empty-title">Aucun historique</div><div class="empty-sub">Commence à cocher des tâches dans le planning pour voir l\'historique ici.</div>';
    body.appendChild(em);return;
  }

  weeks.forEach(wk=>{
    const checks=mst.checks?.[wk]||{};
    const tasks=getWeekTasks(wk);
    const isCur=wk===currentWeekKey();
    const totalDone=tasks.filter(t=>checks[t.id]).length;
    const total=tasks.length;
    if(total===0)return;

    const card=document.createElement('div');card.className='hist-week';
    card.style.borderLeft=isCur?'3px solid var(--gr)':'';
    const loicT=tasks.filter(t=>t.owner==='loic');
    const perrineT=tasks.filter(t=>t.owner==='perrine');
    const loicDone=loicT.filter(t=>checks[t.id]).length;
    const perrineDone=perrineT.filter(t=>checks[t.id]).length;

    const hdr=document.createElement('div');hdr.className='hist-week-hdr';
    const pct=total>0?Math.round(totalDone/total*100):0;
    const loicPct=loicT.length>0?Math.round(loicDone/loicT.length*100):0;
    const perrinePct=perrineT.length>0?Math.round(perrineDone/perrineT.length*100):0;
    hdr.innerHTML=`
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <span class="hist-week-label">${weekLabel(wk)}</span>
          ${isCur?'<span style="font-size:10px;background:var(--grl);color:var(--gr);padding:1px 6px;border-radius:99px;font-weight:600;flex-shrink:0;">Actuelle</span>':''}
          <span style="font-size:11px;color:var(--tx3);flex-shrink:0;">${totalDone}/${total} · ${pct}%</span>
        </div>
        <div style="display:flex;gap:10px;margin-top:4px;flex-wrap:wrap;">
          <span style="font-size:11px;display:flex;align-items:center;gap:4px;">
            <span style="width:7px;height:7px;border-radius:50%;background:#1b4b87;display:inline-block;flex-shrink:0;"></span>
            Loïc ${loicDone}/${loicT.length} (${loicPct}%)
          </span>
          <span style="font-size:11px;display:flex;align-items:center;gap:4px;">
            <span style="width:7px;height:7px;border-radius:50%;background:#b07a2c;display:inline-block;flex-shrink:0;"></span>
            Perrine ${perrineDone}/${perrineT.length} (${perrinePct}%)
          </span>
        </div>
        ${total>0?`<div style="margin-top:6px;height:3px;background:var(--bd);border-radius:99px;overflow:hidden;"><div style="width:${pct}%;height:100%;background:${pct===100?'var(--gr)':'var(--am)'};border-radius:99px;transition:width .3s;"></div></div>`:''}
      </div>
      <span style="font-size:13px;color:var(--tx3);margin-left:12px;flex-shrink:0;">${expanded?'▴':'▾'}</span>`;

    // Expandable task list
    const taskList=document.createElement('div');taskList.style.cssText='display:none;border-top:1px solid var(--bd);';
    let expanded=false;

    // Group by person
    ['loic','perrine'].forEach(person=>{
      const personTasks=tasks.filter(t=>t.owner===person);
      if(!personTasks.length)return;
      const personHdr=document.createElement('div');
      personHdr.style.cssText=`padding:6px 13px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:${person==='loic'?'#1b4b87':'#b07a2c'};background:var(--s2);`;
      personHdr.textContent=(person==='loic'?'👤 Loïc':'👤 Perrine');
      taskList.appendChild(personHdr);

      personTasks.forEach(task=>{
        const done=!!checks[task.id];
        const row=document.createElement('div');
        row.style.cssText=`display:flex;align-items:center;gap:8px;padding:7px 13px;border-bottom:1px solid var(--bd);background:${done?'var(--grl)':'var(--sf)'};${isCur?'cursor:pointer;':''}`; 
        row.innerHTML=`
          <span style="font-size:16px;">${done?'✅':'❌'}</span>
          <div style="flex:1;">
            <div style="font-size:12.5px;color:var(--tx);${done?'text-decoration:line-through;color:var(--tx3);':''}">${task.label}</div>
            <div style="font-size:10px;color:var(--tx3);">${task.secIcon} ${task.secName} · ${fmtMin(task.min)}</div>
          </div>
          ${done?'<span style="font-size:10px;color:var(--gr);font-weight:600;">Fait ✓</span>':'<span style="font-size:10px;color:var(--rd);">À faire</span>'}`;
        // Allow checking from current week history
        if(isCur){
          row.onclick=()=>{
            const nowDone=!isWeekDone(task.id,wk);
            setWeekDone(task.id,wk,nowDone,person);
            row.style.background=nowDone?'var(--grl)':'var(--sf)';
            row.querySelector('span:first-child').textContent=nowDone?'✅':'❌';
            row.querySelector('div div:first-child').style.textDecoration=nowDone?'line-through':'none';
            row.querySelector('div div:first-child').style.color=nowDone?'var(--tx3)':'var(--tx)';
            row.querySelector('span:last-child').textContent=nowDone?'Fait ✓':'À faire';
            row.querySelector('span:last-child').style.color=nowDone?'var(--gr)':'var(--rd)';
          };
        }
        taskList.appendChild(row);
      });
    });

    hdr.onclick=()=>{
      expanded=!expanded;
      taskList.style.display=expanded?'block':'none';
      const arrow=hdr.querySelector('span:last-child');
      if(arrow)arrow.textContent=expanded?'▴':'▾';
    };
    card.appendChild(hdr);
    card.appendChild(taskList);
    body.appendChild(card);
  });
}

function renderPlanCharge(body){
  body.className='plan-body full';
  body.style.padding='1.25rem';
  body.style.overflowY='auto';
  const weeks=getLastNWeeks(8);

  let loicTotalMin=0,perrineTotalMin=0,loicDoneMin=0,perrineDoneMin=0;
  weeks.forEach(wk=>{
    const checks=mst.checks?.[wk]||{};
    getWeekTasks(wk).forEach(t=>{
      if(t.owner==='loic'){loicTotalMin+=t.min;if(checks[t.id])loicDoneMin+=t.min;}
      else{perrineTotalMin+=t.min;if(checks[t.id])perrineDoneMin+=t.min;}
    });
  });
  const totalMin=loicTotalMin+perrineTotalMin;
  const loicShare=totalMin>0?Math.round(loicTotalMin/totalMin*100):50;
  const diff=Math.abs(loicTotalMin-perrineTotalMin);
  const balanced=diff<=BALANCE_THRESHOLD_GLOBAL;

  const grid=document.createElement('div');grid.className='charge-grid';
  grid.innerHTML=`
    <div class="charge-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:.5rem;"><span style="width:10px;height:10px;border-radius:50%;background:#1b4b87;flex-shrink:0;display:inline-block"></span><div class="charge-name">Loïc</div></div>
      <div class="charge-big">${fmtMin(loicTotalMin)}</div>
      <div class="charge-sub">assignées sur 8 semaines · ${loicShare}% du total</div>
      <div style="margin-top:8px;font-size:12px;color:var(--tx2);">${loicDoneMin>0?'✓ '+fmtMin(loicDoneMin)+' effectuées ('+Math.round(loicDoneMin/loicTotalMin*100)+'%)':'Aucune tâche cochée encore'}</div>
    </div>
    <div class="charge-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:.5rem;"><span style="width:10px;height:10px;border-radius:50%;background:#b07a2c;flex-shrink:0;display:inline-block"></span><div class="charge-name">Perrine</div></div>
      <div class="charge-big">${fmtMin(perrineTotalMin)}</div>
      <div class="charge-sub">assignées sur 8 semaines · ${100-loicShare}% du total</div>
      <div style="margin-top:8px;font-size:12px;color:var(--tx2);">${perrineDoneMin>0?'✓ '+fmtMin(perrineDoneMin)+' effectuées ('+Math.round(perrineDoneMin/perrineTotalMin*100)+'%)':'Aucune tâche cochée encore'}</div>
    </div>`;
  body.appendChild(grid);

  const balCard=document.createElement('div');
  balCard.style.cssText='background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;margin-bottom:1rem;';
  balCard.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="font-size:13px;font-weight:600;">Répartition globale — 8 dernières semaines</span>
      <span style="font-size:12px;color:${balanced?'var(--gr)':'var(--am)'};font-weight:600;background:${balanced?'var(--grl)':'var(--aml)'};padding:3px 9px;border-radius:99px;">${balanced?'⚖️ Équilibré':'⚠️ Écart '+fmtMin(diff)}</span>
    </div>
    <div class="charge-bar-bg"><div class="charge-bar-loic" style="width:${loicShare}%"></div><div class="charge-bar-perrine" style="width:${100-loicShare}%"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--tx3);">
      <span>● Loïc ${loicShare}%</span><span>● Perrine ${100-loicShare}%</span>
    </div>`;
  body.appendChild(balCard);

  // Week chart
  const chartCard=document.createElement('div');chartCard.style.cssText='background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;';
  chartCard.innerHTML='<div style="font-size:13px;font-weight:600;margin-bottom:.75rem;">Semaine par semaine</div>';
  const maxMin=Math.max(...weeks.map(wk=>{const t=getWeekTasks(wk);return Math.max(t.filter(x=>x.owner==='loic').reduce((a,x)=>a+x.min,0),t.filter(x=>x.owner==='perrine').reduce((a,x)=>a+x.min,0));}),1);
  weeks.forEach(wk=>{
    const tasks=getWeekTasks(wk);const checks=mst.checks?.[wk]||{};
    const lMin=tasks.filter(t=>t.owner==='loic').reduce((a,t)=>a+t.min,0);
    const pMin=tasks.filter(t=>t.owner==='perrine').reduce((a,t)=>a+t.min,0);
    const lDone=tasks.filter(t=>t.owner==='loic'&&checks[t.id]).reduce((a,t)=>a+t.min,0);
    const pDone=tasks.filter(t=>t.owner==='perrine'&&checks[t.id]).reduce((a,t)=>a+t.min,0);
    const isCur=wk===currentWeekKey();
    const row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:8px;';
    row.innerHTML=`
      <span style="font-size:10px;color:${isCur?'var(--gr)':'var(--tx3)'};min-width:42px;text-align:right;font-weight:${isCur?700:400};">${weekLabel(wk).split(' ')[0]}</span>
      <div style="flex:1;">
        <div style="display:flex;height:12px;border-radius:3px;overflow:hidden;margin-bottom:3px;">
          <div style="width:${Math.round(lMin/maxMin*100)}%;background:${isCur?'#1b4b87':'rgba(27,75,135,.35)'};border-radius:3px;position:relative;">
            ${lDone>0&&lMin>0?`<div style="width:${Math.round(lDone/lMin*100)}%;height:100%;background:#1b4b87;"></div>`:''}
          </div>
        </div>
        <div style="display:flex;height:12px;border-radius:3px;overflow:hidden;">
          <div style="width:${Math.round(pMin/maxMin*100)}%;background:${isCur?'#b07a2c':'rgba(176,122,44,.35)'};border-radius:3px;position:relative;">
            ${pDone>0&&pMin>0?`<div style="width:${Math.round(pDone/pMin*100)}%;height:100%;background:#b07a2c;"></div>`:''}
          </div>
        </div>
      </div>
      <div style="font-size:10px;color:var(--tx3);min-width:80px;"><div>L: ${fmtMin(lMin)}</div><div>P: ${fmtMin(pMin)}</div></div>`;
    chartCard.appendChild(row);
  });
  const leg=document.createElement('div');leg.style.cssText='display:flex;gap:12px;margin-top:8px;font-size:10px;color:var(--tx3);flex-wrap:wrap;';
  leg.innerHTML='<span><span style="display:inline-block;width:10px;height:10px;background:#1b4b87;border-radius:2px;margin-right:3px;"></span>Loïc</span><span><span style="display:inline-block;width:10px;height:10px;background:#b07a2c;border-radius:2px;margin-right:3px;"></span>Perrine</span><span style="margin-left:auto;font-style:italic;font-size:9px;">Clair = assigné · Foncé = effectué</span>';
  chartCard.appendChild(leg);
  body.appendChild(chartCard);
}

/* ═══ RENDER ALL ═══ */
function renderAll(){
  try{
    renderProfiles();
    renderContent();
    updateUI(); // updateUI calls renderSidebar internally — no double render
  }catch(e){console.error('renderAll error:',e);}
}

/* ═══ INIT ═══ */
function appInit(){
  loadRoot();
  st=loadP(root.active);
  mst=loadMst();
  activeRoom='__week__'; // Start with week planning view in ménage mode
  document.getElementById('tbHEFields').style.display='none';
  document.getElementById('cdBanner').style.display='none';
  document.getElementById('abarHE').style.display='none';
  document.getElementById('sidebarHE').style.display='none';
  syncFields();
  renderAll();
  checkYearArchive();
  document.getElementById('fieldName').addEventListener('input',e=>{st['meta_name']=e.target.value;saveP();document.title=(e.target.value||'Ménage')+'— Planning';});
  document.getElementById('fieldDate').addEventListener('change',e=>{st['meta_date']=e.target.value;saveP();updateCountdownBanner();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeCeleb();closeDashboard();closeEffortModal();closePlanning();}});
  // Show sync status in topbar
  if(!window._fbOffline){
    const ind=document.createElement('div');
    ind.id='fbIndicator';
    ind.style.cssText='font-size:10px;color:var(--gr);display:flex;align-items:center;gap:4px;flex-shrink:0;';
    ind.innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:var(--gr);display:inline-block;"></span>Sync activée';
    const tb=document.querySelector('.topbar');
    if(tb)tb.appendChild(ind);
  }
}

// Wait for Firebase to be ready before initializing
if(window._fbReady){
  appInit();
} else {
  window._fbInitCallback=appInit;
  // Safety timeout — init anyway after 3s even if Firebase is slow
  setTimeout(()=>{if(!window._fbReady){window._fbOffline=true;window._fbReady=true;appInit();}},FIREBASE_TIMEOUT_MS);
}
</script>
