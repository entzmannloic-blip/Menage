<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ménage — Planning</title>
<meta name="theme-color" content="#1a3d2b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ménage">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0ede6;--sf:#fff;--s2:#f7f5f1;--s3:#edeae3;
  --bd:rgba(26,23,14,.08);--bdm:rgba(26,23,14,.13);--bds:rgba(26,23,14,.18);
  --tx:#18160e;--tx2:#5a5849;--tx3:#9a9788;
  --gr:#1a6647;--gr2:#23875f;--grl:#e2f1ea;--grm:#85c9a8;
  --am:#8f4408;--aml:#fceedd;--amm:#e8a96a;
  --rd:#b22f22;--rdl:#fdecea;
  --pu:#6b3fa0;--pul:#f0eafa;
  --r:12px;--rsm:8px;--rxs:5px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.09),0 2px 4px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}

/* ══ TOPBAR ══ */
.topbar{background:var(--gr);padding:0 1.5rem;display:flex;align-items:center;gap:.9rem;height:54px;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.18);}
.tb-brand{font-family:'Fraunces',serif;font-size:15px;font-weight:500;color:#fff;letter-spacing:-.3px;white-space:nowrap;flex-shrink:0;}
.tb-brand em{font-style:italic;font-weight:300;opacity:.8;}
.tb-sep{width:1px;height:18px;background:rgba(255,255,255,.2);flex-shrink:0;}
.tb-field{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.18);border-radius:99px;padding:4px 10px;transition:background .15s;}
.tb-field:hover{background:rgba(255,255,255,.18);}
.tb-field-icon{font-size:11px;opacity:.55;flex-shrink:0;}
.tb-field input{background:transparent;border:none;outline:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;width:115px;}
.tb-field input::placeholder{color:rgba(255,255,255,.4);}
.tb-field input[type=date]{width:122px;color-scheme:dark;}
.tb-spacer{flex:1;}
.view-toggle{display:flex;align-items:center;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2);border-radius:99px;padding:2px;flex-shrink:0;}
.vt-btn{padding:3px 11px;border-radius:99px;font-size:11.5px;font-weight:500;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.7);font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;}
.vt-btn.active{background:#fff;color:var(--gr);}
/* View toggle inside action bar (white background context) */
.abar .view-toggle{background:var(--s2);border-color:var(--bdm);}
.abar .vt-btn{color:var(--tx3);}
.abar .vt-btn.active{background:var(--sf);color:var(--gr);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.tb-progress{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.tb-pct{font-family:'Fraunces',serif;font-size:19px;font-weight:600;color:#fff;letter-spacing:-1px;min-width:42px;text-align:right;}
.tb-bar-bg{width:72px;height:4px;background:rgba(255,255,255,.18);border-radius:99px;overflow:hidden;}
.tb-bar-fill{height:100%;background:rgba(255,255,255,.85);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}

/* ══ COUNTDOWN BANNER (conditional) ══ */
.countdown-banner{display:none;align-items:center;justify-content:center;gap:8px;padding:6px 1.5rem;font-size:12px;font-weight:500;}
.countdown-banner.urgent{display:flex;background:var(--rdl);color:var(--rd);}
.countdown-banner.soon{display:flex;background:var(--aml);color:var(--am);}

/* ══ LAYOUT ══ */
.app{display:flex;min-height:calc(100vh - 54px);}

/* ══ SIDEBAR ══ */
.sidebar{
  width:196px;flex-shrink:0;
  background:var(--sf);border-right:1px solid var(--bd);
  padding:.875rem .625rem;
  position:sticky;top:54px;height:calc(100vh - 54px);
  overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bd) transparent;
}
.sb-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);padding:0 6px;margin-bottom:5px;margin-top:10px;}
.sb-label:first-child{margin-top:0;}
.sb-divider{height:1px;background:var(--bd);margin:8px 0;}
.rb{
  display:flex;align-items:center;gap:8px;width:100%;
  padding:7px 8px 9px;border-radius:var(--rsm);
  border:none;background:transparent;cursor:pointer;
  font-family:'DM Sans',sans-serif;text-align:left;
  transition:background .12s;margin-bottom:1px;position:relative;
}
.rb:hover{background:var(--s2);}
.rb.active{background:var(--grl);}
.rb.complete{background:var(--grl);}
.rb-icon{font-size:15px;flex-shrink:0;width:22px;text-align:center;line-height:1;}
.rb-info{flex:1;min-width:0;}
.rb-name{font-size:12px;font-weight:500;color:var(--tx);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rb.active .rb-name,.rb.complete .rb-name{color:var(--gr);}
.rb-meta{font-size:10px;color:var(--tx3);margin-top:1px;}
.rb.active .rb-meta,.rb.complete .rb-meta{color:var(--gr2);}
.rb-bar{position:absolute;bottom:3px;left:8px;right:8px;height:2px;background:var(--bd);border-radius:99px;overflow:hidden;}
.rb-bar-fill{height:100%;background:var(--grm);border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);}
.rb.complete .rb-bar-fill{background:var(--gr);}

/* ══ MAIN ══ */
.main{flex:1;min-width:0;padding:1.25rem 1.5rem 5rem;}

/* ══ ACTION BAR ══ */
.abar{display:flex;align-items:center;gap:5px;margin-bottom:.875rem;flex-wrap:wrap;}
.ab{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bdm);background:var(--sf);color:var(--tx2);font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.ab:hover{background:var(--s2);color:var(--tx);}
.ab:active{transform:scale(.97);}
.ab.primary{background:var(--gr);color:#fff;border-color:var(--gr);}
.ab.primary:hover{background:#155438;}
.ab.foc{background:var(--aml);color:var(--am);border-color:var(--amm);}
.ab.danger{color:var(--rd);background:var(--rdl);border-color:rgba(178,47,34,.18);}
.ab.danger:hover{background:#fbd9d7;}
.ab-sp{flex:1;}
.fchip{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;border-radius:99px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--tx3);font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.fchip:hover{color:var(--tx2);border-color:var(--bdm);}
.fchip.fa{background:var(--grl);border-color:var(--grm);color:var(--gr);}
.fchip.fp{background:var(--aml);border-color:var(--amm);color:var(--am);}
.fchip.fd{background:var(--s3);border-color:var(--bdm);color:var(--tx2);}
.fchip.fe1{background:#e8f5f0;border-color:#85c9a8;color:var(--gr);}
.fchip.fe2{background:var(--aml);border-color:var(--amm);color:var(--am);}
.fchip.fe3{background:var(--rdl);border-color:#e8b4b0;color:var(--rd);}
.fcnt{background:rgba(0,0,0,.08);border-radius:99px;padding:0 4px;font-size:9.5px;display:inline-block;}

/* ══ ROOM HEADER ══ */
.room-hdr{display:flex;align-items:center;gap:12px;margin-bottom:1rem;padding-bottom:1rem;border-bottom:2px solid var(--bd);}
.room-hdr-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;}
.room-hdr-info{flex:1;}
.room-hdr-title{font-family:'Fraunces',serif;font-size:21px;font-weight:500;letter-spacing:-.4px;}
.room-hdr-meta{font-size:11.5px;color:var(--tx3);margin-top:2px;}
.room-hdr-right{text-align:right;flex-shrink:0;}
.room-pct{font-family:'Fraunces',serif;font-size:27px;font-weight:600;letter-spacing:-1px;line-height:1;}
.room-pct.all-done{color:var(--gr);}
.room-bar-bg{width:76px;height:3px;background:var(--bd);border-radius:99px;overflow:hidden;margin-top:5px;margin-left:auto;}
.room-bar-fill{height:100%;border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);}

/* ══ TASK CARD ══ */
.task-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:5px;box-shadow:var(--shadow);transition:border-color .2s,box-shadow .15s;}
.task-card:hover{box-shadow:var(--shadow-md);}
.task-card.done-card{border-color:var(--grm);background:var(--grl);}
.task-card.budget-hl{border-color:var(--gr);box-shadow:0 0 0 2px rgba(26,102,71,.1);}
@keyframes slideIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
.task-card.new-in{animation:slideIn .2s ease;}

.task-row{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:transparent;}
.task-row:hover{background:var(--s2);}
.task-card.done-card .task-row:hover{background:#d5ead9;}

.cb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--bds);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .18s cubic-bezier(.4,0,.2,1);background:var(--sf);}
.task-card.done-card .cb{background:var(--gr);border-color:var(--gr);}
.task-card.done-card:not(.cascade-item) .cb{animation:cbPop .25s cubic-bezier(.34,1.56,.64,1);}
@keyframes cbPop{0%{transform:scale(1);}50%{transform:scale(1.28);}100%{transform:scale(1);}}
.cb-svg{opacity:0;transition:opacity .14s;}
.task-card.done-card .cb-svg{opacity:1;}

.task-main{flex:1;min-width:0;}
.task-label{font-size:13px;color:var(--tx);line-height:1.4;transition:color .15s;}
.task-card.done-card .task-label{color:var(--tx3);text-decoration:line-through;text-decoration-color:var(--tx3);}
.task-meta{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap;}
.task-note-prev{font-size:11px;color:var(--gr2);font-weight:500;display:none;}
.task-note-prev.on{display:block;}
/* Effort badges */
.ef{display:inline-flex;align-items:center;font-size:9.5px;font-weight:600;padding:1px 5px;border-radius:99px;flex-shrink:0;}
.ef0{background:var(--s3);color:var(--tx3);}
.ef1{background:#e8f5f0;color:#1a6647;}
.ef2{background:#fdf0e0;color:#8f4408;}
.ef3{background:#fdecea;color:#b22f22;}
/* Editable duration chip */
.dur-wrap{display:inline-flex;align-items:center;gap:2px;flex-shrink:0;}
.dur-chip{font-size:10px;color:var(--tx3);cursor:pointer;border-radius:4px;padding:0 3px;transition:background .12s;}
.dur-chip:hover{background:var(--s3);color:var(--tx2);}
.dur-chip.editing{display:none;}
.dur-inp{width:38px;font-size:10px;font-family:'DM Sans',sans-serif;color:var(--tx);background:var(--sf);border:1px solid var(--grm);border-radius:4px;padding:1px 4px;outline:none;display:none;}
.dur-inp.editing{display:inline-block;}
.dur-edit-icon{font-size:9px;color:var(--tx3);opacity:0;transition:opacity .12s;cursor:pointer;}
.task-row:hover .dur-edit-icon{opacity:1;}
.task-card.done-card .task-meta{opacity:.42;}
/* Actions */
.task-acts{display:flex;align-items:center;gap:2px;flex-shrink:0;margin-top:-1px;}
.task-act{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:5px;cursor:pointer;border:none;background:none;font-size:12px;color:var(--tx3);transition:all .12s;}
.task-act:hover{background:var(--s3);color:var(--tx);}
.task-act.del:hover{background:var(--rdl);color:var(--rd);}
.done-badge{font-size:9px;font-weight:600;padding:1px 5px;border-radius:99px;background:rgba(26,102,71,.14);color:var(--gr);opacity:0;transition:opacity .2s;flex-shrink:0;}
.task-card.done-card .done-badge{opacity:1;}

/* Note editor */
.note-ed{display:none;padding:6px 13px 10px;background:var(--s2);border-top:1px solid var(--bd);}
.note-ed.on{display:block;}
.note-ta{width:100%;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--tx);background:var(--sf);border:1px solid var(--bdm);border-radius:var(--rxs);padding:6px 9px;resize:none;outline:none;line-height:1.4;min-height:46px;}
.note-ta:focus{border-color:var(--grm);}
.note-btns{display:flex;gap:5px;margin-top:5px;}
.note-save{padding:4px 10px;font-size:11px;font-weight:500;font-family:'DM Sans',sans-serif;background:var(--gr);color:#fff;border:none;border-radius:var(--rxs);cursor:pointer;}
.note-save:hover{background:#155438;}
.note-cancel{padding:4px 8px;font-size:11px;font-weight:500;font-family:'DM Sans',sans-serif;background:transparent;color:var(--tx3);border:1px solid var(--bdm);border-radius:var(--rxs);cursor:pointer;}

/* Add task row */
.add-row{display:flex;align-items:center;gap:5px;padding:7px 13px;border-top:1px dashed var(--bdm);background:var(--s2);}
.add-inp{flex:1;background:transparent;border:none;outline:none;font-size:12.5px;color:var(--tx);font-family:'DM Sans',sans-serif;padding:2px 0;min-width:0;}
.add-inp::placeholder{color:var(--tx3);}
.add-dur{width:44px;background:transparent;border:none;outline:none;font-size:11px;color:var(--tx3);font-family:'DM Sans',sans-serif;padding:2px 3px;border-left:1px solid var(--bdm);text-align:center;flex-shrink:0;}
.add-dur::placeholder{color:var(--tx3);font-size:10px;}
.add-btn{width:21px;height:21px;display:flex;align-items:center;justify-content:center;border-radius:5px;cursor:pointer;border:1px solid var(--bdm);background:var(--sf);font-size:14px;color:var(--tx3);transition:all .12s;flex-shrink:0;}
.add-btn:hover{background:var(--grl);color:var(--gr);border-color:var(--grm);}

/* ══ CATEGORY VIEW ══ */
.cat-sec{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow);transition:border-color .2s;}
.cat-sec.ok{border-color:var(--grm);}
.cat-hdr{display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer;transition:background .14s;border-bottom:1px solid transparent;user-select:none;}
.cat-hdr:hover{background:var(--s2);}
.cat-sec:not(.collapsed) .cat-hdr{border-bottom-color:var(--bd);}
.cat-sec.ok .cat-hdr{background:var(--grl);}
.cat-sec.ok .cat-hdr:hover{background:#d5ead9;}
.cat-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;font-size:15px;}
.cat-info{flex:1;min-width:0;}
.cat-title{font-size:13px;font-weight:600;color:var(--tx);}
.cat-sub-txt{font-size:10.5px;color:var(--tx3);margin-top:1px;}
.cat-right{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.cat-bar-bg{width:60px;height:2.5px;background:var(--bdm);border-radius:99px;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);}
.cat-pct{font-size:10.5px;font-weight:600;color:var(--tx3);min-width:24px;text-align:right;}
.cat-pct.ok{color:var(--gr);}
.cat-ok-badge{font-size:9.5px;font-weight:600;padding:2px 6px;border-radius:99px;background:var(--gr);color:#fff;opacity:0;transition:opacity .2s;flex-shrink:0;}
.cat-sec.ok .cat-ok-badge{opacity:1;}
.cat-chev{width:12px;height:12px;color:var(--tx3);transition:transform .22s cubic-bezier(.4,0,.2,1);}
.cat-sec.collapsed .cat-chev{transform:rotate(-90deg);}
.cat-sec.collapsed .cat-body{display:none;}

/* ══ EMPTY STATES ══ */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--tx3);}
.empty-icon{font-size:34px;display:block;margin-bottom:9px;}
.empty-title{font-family:'Fraunces',serif;font-size:17px;font-weight:500;color:var(--tx2);margin-bottom:5px;}
.empty-sub{font-size:12px;line-height:1.6;}

/* ══ MODAL ══ */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;z-index:9000;opacity:0;pointer-events:none;transition:opacity .18s;}
.modal-ov.on{opacity:1;pointer-events:all;}
.modal{background:var(--sf);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.18);padding:1.625rem;width:min(380px,calc(100vw - 2rem));transform:scale(.94) translateY(8px);transition:transform .22s cubic-bezier(.34,1.3,.64,1);}
.modal-ov.on .modal{transform:scale(1) translateY(0);}
.modal-ico{font-size:26px;margin-bottom:8px;}
.modal-title{font-family:'Fraunces',serif;font-size:18px;font-weight:500;margin-bottom:6px;}
.modal-body{font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:1rem;}
.modal-inp{width:100%;border:1px solid var(--bdm);border-radius:var(--rxs);padding:8px 11px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--tx);outline:none;margin-bottom:.75rem;background:var(--s2);}
.modal-inp:focus{border-color:var(--grm);}
.modal-acts{display:flex;gap:6px;justify-content:flex-end;}
.mbtn{padding:7px 14px;border-radius:var(--rsm);font-size:12.5px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid var(--bdm);background:var(--sf);color:var(--tx2);transition:all .14s;}
.mbtn:hover{background:var(--s2);}
.mbtn.red{background:var(--rd);color:#fff;border-color:var(--rd);}
.mbtn.red:hover{background:#8f2318;}
.mbtn.grn{background:var(--gr);color:#fff;border-color:var(--gr);}
.mbtn.grn:hover{background:#155438;}

/* ══ CELEBRATION ══ */
.celeb-ov{position:fixed;inset:0;background:rgba(0,0,0,.36);display:flex;align-items:center;justify-content:center;z-index:9998;opacity:0;pointer-events:none;transition:opacity .38s;}
.celeb-ov.on{opacity:1;pointer-events:all;}
.celeb-card{background:var(--sf);border-radius:20px;box-shadow:0 24px 80px rgba(0,0,0,.2);padding:2.25rem 2.75rem;text-align:center;max-width:400px;width:calc(100vw - 2.5rem);transform:scale(.94) translateY(18px);transition:transform .44s cubic-bezier(.34,1.2,.64,1);}
.celeb-ov.on .celeb-card{transform:scale(1) translateY(0);}
.celeb-emoji{font-size:48px;display:block;margin-bottom:.875rem;animation:bnc .9s ease infinite alternate;}
@keyframes bnc{from{transform:translateY(0);}to{transform:translateY(-9px);}}
.celeb-title{font-family:'Fraunces',serif;font-size:24px;font-weight:500;letter-spacing:-.3px;margin-bottom:6px;}
.celeb-sub{font-size:13px;color:var(--tx2);line-height:1.65;margin-bottom:1.1rem;}
.celeb-stats{display:flex;gap:1.5rem;justify-content:center;margin-bottom:1.25rem;}
.cstat-val{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--gr);}
.cstat-lbl{font-size:10px;color:var(--tx3);margin-top:2px;}
.celeb-close{padding:9px 22px;background:var(--gr);color:#fff;border:none;border-radius:var(--rsm);font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .14s;}
.celeb-close:hover{background:#155438;}

/* ══ CONFETTI ══ */
@keyframes cf{0%{transform:translateY(0) rotate(0) scale(1);opacity:1;}100%{transform:translateY(-110px) rotate(200deg) scale(.2);opacity:0;}}
.cfp{position:fixed;pointer-events:none;animation:cf .85s ease-out forwards;z-index:99999;border-radius:2px;}

/* ══ EFFORT SUB-MODAL ══ */
.ef-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.55);
  display:flex;align-items:center;justify-content:center;
  z-index:9600;opacity:0;pointer-events:none;transition:opacity .18s;
}
.ef-ov.on{opacity:1;pointer-events:all;}
.ef-modal{
  background:var(--sf);border-radius:14px;
  box-shadow:0 24px 80px rgba(0,0,0,.25);
  width:min(520px,calc(100vw - 2rem));
  max-height:calc(100vh - 4rem);
  display:flex;flex-direction:column;
  transform:scale(.94) translateY(10px);
  transition:transform .22s cubic-bezier(.34,1.2,.64,1);
  overflow:hidden;
}
.ef-ov.on .ef-modal{transform:scale(1) translateY(0);}
.ef-header{
  display:flex;align-items:center;gap:10px;
  padding:.875rem 1rem;border-bottom:1px solid var(--bd);flex-shrink:0;
}
.ef-title{font-family:'Fraunces',serif;font-size:17px;font-weight:500;flex:1;}
.ef-meta{font-size:11px;color:var(--tx3);flex-shrink:0;}
.ef-body{overflow-y:auto;padding:.75rem 1rem;flex:1;}
.ef-task-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 11px;border:1px solid var(--bd);border-radius:var(--rsm);
  margin-bottom:5px;cursor:pointer;transition:background .1s;
  background:var(--sf);
}
.ef-task-row:hover{background:var(--s2);}
.ef-task-row.done-row{background:var(--grl);border-color:var(--grm);}
.ef-task-origin{font-size:10px;color:var(--tx3);white-space:nowrap;flex-shrink:0;}
.ef-task-label{flex:1;font-size:13px;color:var(--tx);line-height:1.35;}
.ef-task-row.done-row .ef-task-label{text-decoration:line-through;color:var(--tx3);}
.ef-task-dur{font-size:10px;color:var(--tx3);flex-shrink:0;}
.ef-task-cb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--bds);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--sf);transition:all .15s;}
.ef-task-row.done-row .ef-task-cb{background:var(--gr);border-color:var(--gr);}

/* ══ PLANNING MODE ══ */
.plan-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:9400;opacity:0;pointer-events:none;transition:opacity .2s;}
.plan-ov.on{opacity:1;pointer-events:all;}
.plan-modal{background:var(--bg);border-radius:16px;box-shadow:0 24px 80px rgba(0,0,0,.22);width:min(1200px,calc(100vw - 2rem));max-height:calc(100vh - 3rem);display:flex;flex-direction:column;transform:scale(.95) translateY(12px);transition:transform .25s cubic-bezier(.34,1.2,.64,1);overflow:hidden;}
.plan-ov.on .plan-modal{transform:scale(1) translateY(0);}
.plan-header{display:flex;align-items:center;gap:12px;padding:1rem 1.25rem;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;}
.plan-title{font-family:'Fraunces',serif;font-size:17px;font-weight:500;letter-spacing:-.3px;}
.plan-week-nav{display:flex;align-items:center;gap:8px;margin-left:auto;}
.plan-week-label{font-size:13px;font-weight:600;color:var(--tx);min-width:80px;text-align:center;}
.plan-week-btn{width:28px;height:28px;border-radius:99px;border:1px solid var(--bdm);background:var(--sf);color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .14s;}
.plan-week-btn:hover{background:var(--s2);}
.plan-week-today{font-size:11px;padding:3px 10px;border-radius:99px;border:1px solid var(--grm);background:var(--grl);color:var(--gr);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .14s;}
.plan-tabs{display:flex;gap:4px;background:var(--s2);border-radius:99px;padding:3px;}
.plan-tab{padding:4px 14px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--tx3);font-family:'DM Sans',sans-serif;transition:all .15s;}
.plan-tab.active{background:var(--sf);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.plan-body{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:1rem;overflow:hidden;}
.plan-body.full{grid-template-columns:1fr;overflow:hidden;padding:0;}
/* Person column */
.plan-col{}
.plan-col-hdr{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;padding-bottom:.75rem;border-bottom:2px solid var(--bd);}
.plan-col-name{font-family:'Fraunces',serif;font-size:18px;font-weight:500;}
.plan-col-meta{font-size:11px;color:var(--tx3);}
/* Task in planning */
.plan-task{display:flex;align-items:center;gap:9px;padding:8px 11px;border:1px solid var(--bd);border-radius:var(--rsm);margin-bottom:5px;cursor:pointer;transition:all .12s;background:var(--sf);}
.plan-task:hover{background:var(--s2);}
.plan-task.done{background:var(--grl);border-color:var(--grm);}
.plan-task.done .plan-task-label{text-decoration:line-through;color:var(--tx3);}
.plan-task-cb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--bds);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--sf);transition:all .15s;}
.plan-task.done .plan-task-cb{background:var(--gr);border-color:var(--gr);}
.plan-task-info{flex:1;min-width:0;}
.plan-task-label{font-size:12.5px;color:var(--tx);line-height:1.3;}
.plan-task-meta{display:flex;align-items:center;gap:5px;margin-top:2px;}
.plan-task-sec{font-size:10px;color:var(--tx3);}
.plan-task-dur{font-size:10px;color:var(--tx3);}
/* History view */
.hist-week{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden;}
.hist-week-hdr{display:flex;align-items:center;gap:10px;padding:10px 13px;cursor:pointer;}
.hist-week-hdr:hover{background:var(--s2);}
.hist-week-label{font-size:13px;font-weight:600;color:var(--tx);flex:1;}
/* Charge dashboard */
.charge-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.charge-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;}
.charge-name{font-family:'Fraunces',serif;font-size:18px;font-weight:500;margin-bottom:.5rem;}
.charge-big{font-family:'Fraunces',serif;font-size:32px;font-weight:600;letter-spacing:-1px;color:var(--tx);}
.charge-sub{font-size:11px;color:var(--tx3);margin-top:3px;}
.charge-bar-bg{height:8px;background:var(--s3);border-radius:99px;overflow:hidden;display:flex;}
.charge-bar-loic{height:100%;background:#1b4b87;border-radius:99px 0 0 99px;transition:width .5s;}
.charge-bar-perrine{height:100%;background:#b07a2c;border-radius:0 99px 99px 0;transition:width .5s;}
@media(max-width:640px){
  .plan-body{grid-template-columns:1fr;}
  .charge-grid{grid-template-columns:1fr;}
}

/* ══ DASHBOARD ══ */
.db-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center;
  z-index:9500;opacity:0;pointer-events:none;transition:opacity .22s;
}
.db-ov.on{opacity:1;pointer-events:all;}
.db-modal{
  background:var(--bg);border-radius:16px;
  box-shadow:0 24px 80px rgba(0,0,0,.22);
  width:min(960px,calc(100vw - 2rem));
  max-height:calc(100vh - 3rem);
  display:flex;flex-direction:column;
  transform:scale(.95) translateY(12px);
  transition:transform .25s cubic-bezier(.34,1.2,.64,1);
  overflow:hidden;
}
.db-ov.on .db-modal{transform:scale(1) translateY(0);}
.db-header{
  display:flex;align-items:center;gap:12px;
  padding:1rem 1.25rem;background:var(--sf);
  border-bottom:1px solid var(--bd);flex-shrink:0;
}
.db-title{font-family:'Fraunces',serif;font-size:17px;font-weight:500;letter-spacing:-.3px;flex-shrink:0;}
.db-tabs{display:flex;gap:4px;background:var(--s2);border-radius:99px;padding:3px;flex-shrink:0;}
.db-tab{
  padding:4px 14px;border-radius:99px;font-size:12px;font-weight:500;
  cursor:pointer;border:none;background:transparent;color:var(--tx3);
  font-family:'DM Sans',sans-serif;transition:all .15s;
}
.db-tab.active{background:var(--sf);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.db-close{
  margin-left:auto;width:28px;height:28px;border-radius:99px;
  display:flex;align-items:center;justify-content:center;
  border:none;background:var(--s2);color:var(--tx3);cursor:pointer;font-size:12px;
  transition:all .14s;flex-shrink:0;
}
.db-close:hover{background:var(--s3);color:var(--tx);}
.db-body{overflow-y:auto;padding:1.25rem;flex:1;}

/* Donut */
.db-donut-wrap{display:flex;align-items:center;gap:2rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.db-donut-svg{flex-shrink:0;}
.db-donut-legend{display:flex;flex-direction:column;gap:8px;}
.db-legend-item{display:flex;align-items:center;gap:8px;font-size:13px;}
.db-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.db-legend-val{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--tx);min-width:32px;}
.db-legend-lbl{color:var(--tx2);}

/* Effort summary */
.db-effort-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;}
.db-effort-card{
  background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);
  padding:.875rem 1rem;text-align:center;
}
.db-effort-icon{font-size:18px;display:block;margin-bottom:4px;}
.db-effort-val{font-family:'Fraunces',serif;font-size:24px;font-weight:600;letter-spacing:-1px;color:var(--tx);}
.db-effort-lbl{font-size:10px;color:var(--tx3);margin-top:2px;}
.db-effort-time{font-size:11px;font-weight:600;color:var(--tx3);margin-top:3px;}

/* Section grid */
.db-grid-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--tx3);margin-bottom:8px;margin-top:1rem;}
.db-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;margin-bottom:1rem;}
.db-sec-card{
  background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);
  padding:.875rem;cursor:pointer;transition:all .15s;
  position:relative;overflow:hidden;
}
.db-sec-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.1);transform:translateY(-1px);}
.db-sec-card.complete{border-color:var(--grm);background:var(--grl);}
.db-sec-card-top{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.db-sec-icon{font-size:18px;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.db-sec-name{font-size:12px;font-weight:600;color:var(--tx);line-height:1.3;}
.db-sec-pct{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--tx);letter-spacing:-1px;line-height:1;}
.db-sec-card.complete .db-sec-pct{color:var(--gr);}
.db-sec-bar-bg{height:3px;background:var(--bd);border-radius:99px;overflow:hidden;margin:6px 0;}
.db-sec-bar-fill{height:100%;border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);}
.db-sec-meta{font-size:10px;color:var(--tx3);display:flex;justify-content:space-between;align-items:center;}
.db-sec-efforts{display:flex;gap:5px;margin-top:5px;}
.db-sec-ef{font-size:10px;color:var(--tx3);}

/* Room dashboard tab */
.db-room-hdr{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;}
.db-room-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.db-room-title{font-family:'Fraunces',serif;font-size:20px;font-weight:500;letter-spacing:-.3px;}
.db-room-meta{font-size:12px;color:var(--tx3);margin-top:2px;}

@media(max-width:640px){
  .db-modal{max-height:calc(100vh - 1rem);border-radius:12px;}
  .db-donut-wrap{flex-direction:column;gap:1rem;}
  .db-effort-row{grid-template-columns:repeat(3,1fr);}
  .db-grid{grid-template-columns:repeat(2,1fr);}
}
/* Sidebar scroll wrapper */
.sb-scroll-wrap{display:flex;flex-direction:column;gap:4px;width:100%;}
.sb-sep-v{height:1px;background:var(--bd);margin:4px 0;flex-shrink:0;}
#sbWeekBtn{width:100%;display:flex;align-items:center;gap:8px;text-align:left;}
.inline-week-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;align-items:start;}
@media(max-width:640px){.inline-week-grid{grid-template-columns:1fr;}}
.freq-badge{font-size:9px;font-weight:600;padding:1px 5px;border-radius:99px;flex-shrink:0;}
.freq-weekly{background:#e8f5f0;color:#1a6647;}
.freq-biweekly{background:#e8edf8;color:#1b4b87;}
.freq-monthly{background:var(--aml);color:var(--am);}
.freq-bimonthly{background:#f0eafa;color:#6b3fa0;}

.drag-handle{
  cursor:grab;color:var(--tx3);font-size:14px;padding:0 4px;
  opacity:0;transition:opacity .15s;flex-shrink:0;user-select:none;
  display:flex;align-items:center;touch-action:none;
}
.task-row:hover .drag-handle{opacity:1;}
.drag-handle:active{cursor:grabbing;}
.task-card.dragging{opacity:.4;border:2px dashed var(--grm);transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,.15);}
.task-card.drag-over-top{border-top:2px solid var(--gr);}
.task-card.drag-over-bot{border-bottom:2px solid var(--gr);}
.rb.dragging-sb{opacity:.4;}
.rb.drag-over-sb{border-top:2px solid var(--gr);}
/* Touch drag ghost */
.touch-ghost{
  position:fixed;z-index:99998;pointer-events:none;
  opacity:.85;transform:scale(1.03) rotate(1deg);
  box-shadow:0 8px 24px rgba(0,0,0,.18);border-radius:var(--r);
  background:var(--sf);transition:none;
}
/* Global effort view */
.global-view-header{
  display:flex;align-items:center;gap:10px;
  margin-bottom:1rem;padding-bottom:1rem;
  border-bottom:2px solid var(--bd);
}
.global-view-title{font-family:'Fraunces',serif;font-size:21px;font-weight:500;letter-spacing:-.3px;flex:1;}
.global-view-meta{font-size:12px;color:var(--tx3);}
.global-sec-label{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:var(--tx3);padding:2px 0;margin-bottom:5px;margin-top:14px;
  display:flex;align-items:center;gap:6px;
}
.global-sec-label::after{content:'';flex:1;height:1px;background:var(--bd);}
.global-sec-label:first-child{margin-top:0;}
/* On touch devices, always show drag handle */
@media(hover:none){
  .drag-handle{opacity:.4;}
}
/* Breadcrumb */
.breadcrumb{
  display:flex;align-items:center;gap:6px;
  padding:5px 0 10px;
  font-size:12px;color:var(--tx3);
  border-bottom:1px solid var(--bd);margin-bottom:.875rem;
}
.bc-seg{color:var(--tx3);font-weight:500;}
.bc-sep{color:var(--tx3);opacity:.5;font-size:10px;}
.bc-current{
  color:var(--tx);font-weight:600;
  display:flex;align-items:center;gap:5px;
}
.bc-icon{font-size:13px;}
.bc-pct{
  font-size:10.5px;font-weight:600;
  padding:1px 7px;border-radius:99px;
  background:var(--s2);color:var(--tx3);
}
.bc-pct.done{background:var(--grl);color:var(--gr);}
.bc-pct.prog{background:var(--aml);color:var(--am);}
@media(max-width:640px){.breadcrumb{padding:4px 0 8px;}}
@media print{
  .topbar,.sidebar,.abar,.util-bar,.modal-ov,.celeb-ov,.add-row,.task-acts,.done-badge,.note-ed,.dur-edit-icon{display:none!important;}
  .app{display:block;}
  .main{padding:1rem;}
  body{background:#fff!important;}
  .task-card{break-inside:avoid;box-shadow:none!important;margin-bottom:4px!important;}
}

/* Mode switch */
.mode-switch{display:flex;gap:3px;background:var(--s2);border-radius:99px;padding:3px;flex-shrink:0;}
.mode-btn{
  padding:5px 14px;border-radius:99px;font-size:12px;font-weight:600;
  cursor:pointer;border:none;background:transparent;color:var(--tx3);
  font-family:'DM Sans',sans-serif;transition:all .18s;white-space:nowrap;
}
.mode-btn.active{background:var(--sf);color:var(--tx);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.mode-btn:not(.active):hover{color:var(--tx2);}
.tb-he-fields{display:flex;gap:6px;align-items:center;}

/* ══ RESPONSIVE ══ */
@media(max-width:820px){
  .sidebar{width:156px;padding:.75rem .5rem;}
  .rb-name{font-size:11.5px;}
  .main{padding:1rem;}
  .db-tabs{flex-wrap:wrap;border-radius:12px;}
  .plan-tabs{flex-wrap:wrap;border-radius:12px;}
}
@media(max-width:640px){
  /* Topbar */
  .topbar{padding:0 .875rem;height:50px;gap:.375rem;flex-wrap:nowrap;}
  .tb-field,.tb-sep{display:none;}
  .tb-bar-bg{width:48px;}
  .tb-pct{font-size:15px;min-width:36px;}
  .tb-brand{font-size:13px;}
  .tb-brand em{display:none;}
  .mode-switch{padding:2px;}
  .mode-btn{padding:4px 10px;font-size:11px;}

  .sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--bd);padding:.5rem .875rem;display:block;}
  #sidebarMenage,#sidebarHE{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--bd);padding:.375rem .875rem;}
  .sb-label,.sb-divider{display:none;}

  /* Sidebar: single scrollable horizontal row with ALL items */
  #sidebarMenage,#sidebarHE{padding:.375rem 0;}
  .sb-scroll-wrap{
    flex-direction:row;
    align-items:center;
    overflow-x:auto;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
    gap:0;
    padding:0 .875rem;
    width:100%;
  }
  .sb-scroll-wrap::-webkit-scrollbar{display:none;}
  /* Semaine button inline */
  #sbWeekBtn{
    width:auto !important;
    flex-shrink:0;
    margin-right:4px;
  }
  /* Vertical separator → small vertical line */
  .sb-sep-v{
    width:1px;height:20px;
    background:var(--bdm);
    margin:0 6px;
    flex-shrink:0;
  }
  /* Rooms scroll inside wrap: flat, no own scroll */
  .sb-rooms-scroll,.sb-gen-scroll{
    display:flex;gap:5px;
    overflow-x:visible;
    flex-shrink:0;
    padding:4px 0;
  }
  .rb{
    width:auto;padding:6px 11px;border-radius:99px;
    border:1px solid var(--bd);margin-bottom:0;flex-shrink:0;
    white-space:nowrap;
  }
  .rb.active{border-color:var(--grm);background:var(--grl);}
  .rb-bar,.rb-meta,.sb-label,.sb-divider{display:none;}
  .rb-name{font-size:12px;white-space:nowrap;}

  /* Main content */
  .main{padding:.75rem .875rem 5rem;min-width:0;overflow-x:hidden;}

  /* Action bar: horizontal scroll (not wrap) */
  .abar{
    gap:5px;flex-wrap:nowrap;

    -webkit-overflow-scrolling:touch;
  }
  .abar::-webkit-scrollbar{display:none;}
  .ab{font-size:11px;padding:5px 10px;white-space:nowrap;flex-shrink:0;}
  .ab-sp{display:none;}

  /* Room header */
  .room-hdr-title{font-size:18px;}
  .room-pct{font-size:22px;}

  /* Task cards */
  .task-row{padding:9px 11px;}
  .task-acts{opacity:1;}
  .task-act{width:26px;height:26px;}
  .cb{width:20px;height:20px;}

  /* Inline week planning — single column on mobile */
  .inline-week-grid{grid-template-columns:1fr;}

  /* Modals — full screen on mobile */
  .plan-modal{
    width:100vw !important;max-width:100vw !important;
    height:100dvh !important;max-height:100dvh !important;
    border-radius:0 !important;margin:0 !important;
  }
  .db-modal{
    width:100vw !important;max-width:100vw !important;
    max-height:100dvh !important;border-radius:0 !important;
  }
  .ef-modal{
    width:calc(100vw - 1rem) !important;
    max-height:85vh !important;border-radius:12px !important;
  }

  /* Plan modal header: compact */
  .plan-header{
    flex-wrap:nowrap;gap:6px;padding:.625rem .75rem;
    align-items:center;
  }
  .plan-title{font-size:14px;flex-shrink:0;}
  /* Tabs: full-width scrollable strip */
  .plan-tabs{
    order:3;width:100%;
    overflow-x:auto;scrollbar-width:none;
    flex-wrap:nowrap;border-radius:99px;
    -webkit-overflow-scrolling:touch;
    flex-shrink:0;
  }
  .plan-tabs::-webkit-scrollbar{display:none;}
  .plan-tab{white-space:nowrap;font-size:11px;padding:4px 10px;}
  .plan-week-nav{order:2;flex-shrink:0;}
  .plan-week-label{font-size:12px;min-width:64px;}

  /* Close button — always visible and large on mobile */
  .db-close,.plan-ov .db-close{
    width:36px;height:36px;font-size:16px;
    background:var(--s2);flex-shrink:0;order:0;margin-left:0;
  }
  /* Plan modal: close button stays top-right always */
  .plan-header .db-close{margin-left:auto;}

<script type="module">
  import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import{getFirestore,doc,onSnapshot,setDoc,getDoc}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig={
    apiKey:"AIzaSyAbE5V7Ovb8V2gMGhITXlKLjqpHjiHnUxk",
    authDomain:"menage-bons-enfants.firebaseapp.com",
    projectId:"menage-bons-enfants",
    storageBucket:"menage-bons-enfants.firebasestorage.app",
    messagingSenderId:"850276811198",
    appId:"1:850276811198:web:5519813bb3a98197a1f9ef"
  };

  const fbApp=initializeApp(firebaseConfig);
  const db=getFirestore(fbApp);
  const MST_DOC='shared/menage';

  // Expose Firebase save/load to global scope
  window._fbSaveMst=async function(data){
    try{
      await setDoc(doc(db,MST_DOC),{data:JSON.stringify(data),ts:Date.now()});
    }catch(e){console.warn('Firebase save error:',e);}
  };

  // Real-time listener — updates UI when other person makes changes
  let _firstLoad=true;
  onSnapshot(doc(db,MST_DOC),(snap)=>{
    if(snap.exists()){
      const remote=JSON.parse(snap.data().data||'{}');
      // Merge remote into local mst
      window.mst=remote;
      if(!_firstLoad){
        // Someone else made a change — refresh UI
        try{renderAll();if(typeof renderPlanning==='function'&&document.getElementById('planOv')?.classList.contains('on'))renderPlanning();}catch(e){}
        showSyncToast();
      }
      _firstLoad=false;
    } else {
      _firstLoad=false;
    }
    window._fbReady=true;
    // Signal app to init now that Firebase is ready
    if(window._fbInitCallback)window._fbInitCallback();
  },{error:(e)=>{
    console.warn('Firebase offline, using localStorage fallback');
    window._fbReady=true;
    window._fbOffline=true;
    if(window._fbInitCallback)window._fbInitCallback();
  }});

  // Sync toast notification
  window.showSyncToast=function(){
    let t=document.getElementById('syncToast');
    if(!t){t=document.createElement('div');t.id='syncToast';
      t.style.cssText='position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1b4b87;color:#fff;padding:8px 16px;border-radius:99px;font-size:12px;font-weight:600;font-family:"DM Sans",sans-serif;z-index:99999;opacity:0;transition:opacity .3s;pointer-events:none;';
      document.body.appendChild(t);}
    t.textContent='🔄 Mise à jour reçue';
    t.style.opacity='1';
    setTimeout(()=>t.style.opacity='0',2500);
  };
</script>

/* ═══ PLANNING LOGIC ═══ */
function isoWeek(date){
  const d=new Date(date);d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-(d.getDay()+6)%7);
  const w=new Date(d.getFullYear(),0,4);
  return{week:1+Math.round(((d-w)/86400000-3+(w.getDay()+6)%7)/7),year:d.getFullYear()};
}
function currentWeekKey(){const{week,year}=isoWeek(new Date());return year+'W'+String(week).padStart(2,'0');}
function weekKeyFromDate(d){const{week,year}=isoWeek(d);return year+'W'+String(week).padStart(2,'0');}
function parseWeekKey(wk){return{year:parseInt(wk.slice(0,4)),week:parseInt(wk.slice(5))};}
function weekLabel(wk){const{year,week}=parseWeekKey(wk);return'S'+week+' '+year;}
function prevWeekKey(wk){
  const{year,week}=parseWeekKey(wk);
  if(week===1){
    // find last week of prev year
    const dec28=new Date(year-1,11,28);
    return weekKeyFromDate(dec28);
  }
  return year+'W'+String(week-1).padStart(2,'0');
}
function nextWeekKey(wk){
  const{year,week}=parseWeekKey(wk);
  // Last ISO week of the year: use Dec 28 which is always in the last week
  const lastWeek=isoWeek(new Date(year,11,28)).week;
  if(week>=lastWeek) return (year+1)+'W01';
  return year+'W'+String(week+1).padStart(2,'0');
}

// Is a task scheduled for a given ISO week number?
function isScheduledThisWeek(task,weekNum){
  const f=task.frequency||'weekly';
  if(f==='weekly') return true;
  if(f==='biweekly'){
    // startWeekParity: 'odd' = active on odd weeks, 'even' = active on even weeks
    if(task.startWeekParity==='odd') return weekNum%FREQ_BIWEEKLY_MODULO===1;
    if(task.startWeekParity==='even') return weekNum%FREQ_BIWEEKLY_MODULO===0;
    return weekNum%FREQ_BIWEEKLY_MODULO===1; // default: odd
  }
  if(f==='monthly') return weekNum%FREQ_MONTHLY_MODULO===1;
  if(f==='bimonthly') return weekNum%FREQ_BIMONTHLY_MODULO===1;
  return true;
}

// Who owns a task for a given ISO week?
// For biweekly/monthly/bimonthly tasks, alternation is based on OCCURRENCE number
// (1st time it's due, 2nd time, 3rd time...) not raw week number
function taskOwnerForWeek(task,weekNum){
  if(!task.owner||task.owner==='loic') return 'loic';
  if(task.owner==='perrine') return 'perrine';
  // alternating — compute which occurrence this week is
  const start=task.startOwner||'loic';
  const f=task.frequency||'weekly';

  let occurrenceIndex;
  if(f==='weekly'){
    occurrenceIndex=weekNum; // every week alternates
  } else if(f==='biweekly'){
    // Active every 2 weeks — occurrence = Math.floor(weekNum/2)
    occurrenceIndex=Math.floor(weekNum/2);
  } else if(f==='monthly'){
    // Active every 4 weeks — occurrence = Math.floor(weekNum/4)
    occurrenceIndex=Math.floor(weekNum/4);
  } else if(f==='bimonthly'){
    // Active every 8 weeks — occurrence = Math.floor(weekNum/8)
    occurrenceIndex=Math.floor(weekNum/8);
  } else {
    occurrenceIndex=weekNum;
  }

  const isEvenOccurrence=occurrenceIndex%2===0;
  if(start==='loic') return isEvenOccurrence?'loic':'perrine';
  return isEvenOccurrence?'perrine':'loic';
}

// Get all tasks scheduled for a given week with their owner
// Group logic: tasks sharing a group= tag all go to the same person
// When a group has both weekly + biweekly tasks:
//   - biweekly weeks: biweekly tasks anchor the group owner → weekly follow
//   - non-biweekly weeks: weekly tasks alternate normally (no biweekly present to anchor)
// Canapé compensation: if canapé owner = cuisine_hebdo owner → flip cuisine to other person
function getWeekTasks(weekKey){
  const{week}=parseWeekKey(weekKey);

  // Step 1: collect all scheduled tasks with their natural owner
  const candidates=[];
  ROOMS.forEach(sec=>{
    sec.tasks.forEach(task=>{
      if(isScheduledThisWeek(task,week)){
        candidates.push({
          ...task,
          secId:sec.id,secName:sec.name,secIcon:sec.icon,
          owner:taskOwnerForWeek(task,week),
          min:mst.overrides?.[task.id]??task.min
        });
      }
    });
  });

  // Step 2: for each group, find the anchor owner
  // Priority: biweekly/monthly tasks anchor the group (they are the "heavier" task)
  // If only weekly tasks in group this week → first task sets the owner
  const groupOwner={};
  const groupHasBiweekly={};

  candidates.forEach(t=>{
    if(!t.group) return;
    const f=t.frequency||'weekly';
    const isBiplus=f==='biweekly'||f==='monthly'||f==='bimonthly';
    if(!(t.group in groupOwner)){
      groupOwner[t.group]=t.owner;
      groupHasBiweekly[t.group]=isBiplus;
    } else if(isBiplus && !groupHasBiweekly[t.group]){
      // Biweekly task found after weekly ones → override the anchor
      groupOwner[t.group]=t.owner;
      groupHasBiweekly[t.group]=true;
    }
  });

  // Step 3: apply group owner to all tasks in the group
  candidates.forEach(t=>{
    if(t.group && t.group in groupOwner) t.owner=groupOwner[t.group];
  });

  // Step 4: canapé compensation
  // If same person does canapé AND cuisine_hebdo this week → flip cuisine to other
  const canape=candidates.find(t=>t.id==='ms_canape');
  if(canape && 'cuisine_hebdo' in groupOwner){
    if(groupOwner['cuisine_hebdo']===canape.owner){
      const other=canape.owner==='loic'?'perrine':'loic';
      groupOwner['cuisine_hebdo']=other;
      candidates.forEach(t=>{if(t.group==='cuisine_hebdo') t.owner=other;});
    }
  }

  return candidates;
}

// Check/uncheck a task for a specific week
function isWeekDone(taskId,weekKey){return!!(mst.checks?.[weekKey]?.[taskId]);}
function setWeekDone(taskId,weekKey,v,owner){
  if(!mst.checks)mst.checks={};
  if(!mst.checks[weekKey])mst.checks[weekKey]={};
  if(v){
    mst.checks[weekKey][taskId]={done:1,by:owner,ts:Date.now()};

  }

}

// Archive current week to history (called when navigating away from it)
function archiveWeek(weekKey){
  if(!mst.history)mst.history={};
  const tasks=getWeekTasks(weekKey);
  const checks=mst.checks?.[weekKey]||{};
  const loicTasks=tasks.filter(t=>t.owner==='loic');
  const perrineTasks=tasks.filter(t=>t.owner==='perrine');
  mst.history[weekKey]={
    loic:{total:loicTasks.length,done:loicTasks.filter(t=>checks[t.id]).length,min:loicTasks.reduce((a,t)=>a+t.min,0),minDone:loicTasks.filter(t=>checks[t.id]).reduce((a,t)=>a+t.min,0)},
    perrine:{total:perrineTasks.length,done:perrineTasks.filter(t=>checks[t.id]).length,min:perrineTasks.reduce((a,t)=>a+t.min,0),minDone:perrineTasks.filter(t=>checks[t.id]).reduce((a,t)=>a+t.min,0)},
  };
  saveMst();
}

// Get last N week keys (for history)
function getLastNWeeks(n){
  const weeks=[];let wk=currentWeekKey();
  for(let i=0;i<n;i++){weeks.unshift(wk);wk=prevWeekKey(wk);}
  return weeks;
}

function effortFromMin(m){return m>0?(m<=5?1:m<=15?2:3):0;}

function checkAllCascade(){
  const pending=allIds().filter(id=>!isDone(id));
  if(!pending.length){updateUI();return;}
  pending.forEach((id,i)=>{
    setTimeout(()=>{
      setDone(id,true);
      const card=document.querySelector('[data-tid="'+id+'"]');
      if(card){card.classList.add('done-card','cascade-item');const s=card.querySelector('.cb-svg');if(s)s.style.opacity='1';const cb=card.querySelector('.cb');if(cb){cb.style.background='var(--gr)';cb.style.borderColor='var(--gr)';}}
      if(i===pending.length-1){saveP();updateUI();}
    },i*CASCADE_DELAY_MS);
  });
}

function renderGlobalView(area){

  const allTasks=Object.values(groups).flat();
  const totalLeft=allTasks.length;
  const totalMin=allTasks.reduce((a,t)=>a+t.m,0);

  // Compute global completion stats
  let totalAll=0,totalDone=0,totalMinAll=0;
  ALL_SECS.forEach(sec=>{
    secTasks(sec).forEach(task=>{
      totalAll++;
      totalMinAll+=getMin(task);
      if(isDone(task.id))totalDone++;
    });
  });
  const globalPct=totalAll>0?Math.round(totalDone/totalAll*100):0;

  if(totalLeft===0){
    area.innerHTML='<div class="empty"><span class="empty-icon">🎉</span><div class="empty-title">Tout est fait !</div><div class="empty-sub">Toutes les tâches sont cochées.</div></div>';
    return;
  }

  // Header with global progress
  const hdr=document.createElement('div');hdr.className='global-view-header';
  hdr.innerHTML=`
    <div style="flex:1">
      <div class="global-view-title">⚡ Vue express</div>
      <div class="global-view-meta">${totalLeft} tâches restantes · ~${fmtMin(totalMin)}</div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:10px;">
        <div style="flex:1;height:4px;background:var(--bd);border-radius:99px;overflow:hidden;max-width:200px;">
          <div style="height:100%;width:${globalPct}%;background:var(--gr);border-radius:99px;transition:width .4s;"></div>
        </div>
        <span style="font-size:12px;font-weight:600;color:${globalPct===100?'var(--gr)':'var(--tx2)'};">${totalDone}/${totalAll} · ${globalPct}%</span>
      </div>
    </div>`;
  area.appendChild(hdr);

  // Render by effort group — simple cards, no drag in express view
  [1,2,3,0].forEach(ef=>{
    const tasks=groups[ef];
    if(!tasks.length)return;

    const lbl=document.createElement('div');
    lbl.className='global-sec-label';
    lbl.textContent=efLabels[ef]+' · '+tasks.length+' tâche'+(tasks.length>1?'s':'')+' · ~'+fmtMin(tasks.reduce((a,t)=>a+t.m,0));
    area.appendChild(lbl);

    tasks.forEach(task=>{
      const done=isDone(task.id);
      const note=getNote(task.id);
      const efCls={0:'ef0',1:'ef1',2:'ef2',3:'ef3'};
      const efLbl={0:'—',1:'Rapide',2:'Moyen',3:'Long'};
      const currentMin=getMin(task);

      const card=document.createElement('div');
      card.className='task-card'+(done?' done-card':'');
      card.dataset.taskId=task.id;

      card.innerHTML=`
        <div class="task-row" data-tid="${task.id}" role="checkbox" tabindex="0" aria-checked="${done}" aria-label="${task.label}">
          <div class="cb" aria-hidden="true">
            <svg class="cb-svg" width="10" height="7" viewBox="0 0 10 7" fill="none" style="opacity:${done?1:0}">
              <path d="M1 3.5l2.5 2.5 5.5-5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="task-main">
            <div class="task-label">${task.label}</div>
            <div class="task-meta">
              <span style="font-size:10px;color:var(--tx3);font-style:italic;">${task.secIcon} ${task.secName}</span>
              <span class="ef ${efCls[ef]}">${efLbl[ef]}</span>
              ${currentMin>0?`<span class="dur-chip">${fmtMin(currentMin)}</span>`:''}
            </div>
          </div>
          <div class="done-badge">Fait</div>
        </div>`;

      const row=card.querySelector('.task-row');
      row.onclick=()=>{toggle(task.id);};
      row.onkeydown=e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();toggle(task.id);}};
      area.appendChild(card);
    });
  });
}

/* ═══ EFFORT DROPDOWN for inline planning ═══ */
function startEditDur(taskId,defaultMin,spanId,inpId){
  const span=document.getElementById(spanId);
  const inp=document.getElementById(inpId);
  if(!span||!inp)return;
  inp.value=defaultMin||'';
  span.classList.add('editing');
  inp.classList.add('editing');
  inp.focus();inp.select();
  function commit(){
    const v=parseInt(inp.value)||0;
    setMin(taskId,v);
    const newMin=getMin({id:taskId,min:defaultMin});
    span.textContent=newMin>0?fmtMin(newMin):'—';
    span.classList.remove('editing');inp.classList.remove('editing');
    updateUI();
  }
  inp.onblur=commit;
  inp.onkeydown=e=>{if(e.key==='Enter')commit();if(e.key==='Escape'){span.classList.remove('editing');inp.classList.remove('editing');}};
}

    // Show history dropdown instead of plain input

    durSpan.textContent=nm>0?fmtMin(nm):'—';
    durSpan.style.display='';durInp.style.display='none';
    updateUI();
    const area=document.getElementById('content');
    if(area&&appMode==='menage'&&activeRoom==='__week__'){
      area.innerHTML='';renderInlineWeekPlanning(area);

  efDropdown.style.cssText='position:absolute;bottom:100%;left:0;background:var(--sf);border:1px solid var(--bdm);border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.12);padding:4px;display:none;z-index:999;white-space:nowrap;min-width:130px;';
  // Header label
  const efDdHdr=document.createElement('div');
  efDdHdr.style.cssText='font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);padding:4px 8px 6px;border-bottom:1px solid var(--bd);margin-bottom:3px;';
  efDdHdr.textContent='Difficulté';
  efDropdown.appendChild(efDdHdr);

  [0,1,2,3].forEach(v=>{

    opt.style.cssText=`padding:5px 8px;border-radius:5px;cursor:pointer;font-size:11px;color:${efColors[v]};font-weight:${v>0?600:400};`;
    opt.textContent=efLabels[v]+' '+efNames[v];
    opt.onmouseenter=()=>opt.style.background='var(--s2)';
    opt.onmouseleave=()=>opt.style.background='';

      e.stopPropagation();
      st['ef_'+task.id]=v;saveP();
      task.effort=v;
      efBtn.textContent=efLabels[v]+(v>0?' '+efNames[v]:'');

      efDropdown.style.display='none';
      efDropdown.classList.remove('ef-dropdown-open');
      updateUI();
      const area=document.getElementById('content');
      if(area&&appMode==='menage'&&activeRoom==='__week__'){
        area.innerHTML='';renderInlineWeekPlanning(area);
      } else if(area&&appMode==='menage'&&activeRoom&&activeRoom!=='__week__'){
        // Refresh room view to show updated effort badge
        renderAll();
      }
    };
    efDropdown.appendChild(opt);
  });
  efBtn.onclick=(e)=>{
    e.stopPropagation();
    openEffortDropdown(task, efBtn, (v)=>{
      const efColors={0:'var(--tx3)',1:'var(--gr)',2:'var(--am)',3:'var(--rd)'};
      const efLabels={0:'—',1:'🟢',2:'🟡',3:'🔴'};
      const efNames={0:'—',1:'Rapide',2:'Moyen',3:'Long'};
      efBtn.textContent=efLabels[v]+(v>0?' '+efNames[v]:'');
      efBtn.style.color=efColors[v];
      updateUI();
      const area=document.getElementById('content');
      if(area&&appMode==='menage'&&activeRoom==='__week__'){
        area.innerHTML='';renderInlineWeekPlanning(area);
      }
    });
  };
  efWrap.appendChild(efBtn);

  meta.appendChild(durSpan);meta.appendChild(durInp);meta.appendChild(editIcon);meta.appendChild(efWrap);
  info.appendChild(lbl);info.appendChild(meta);

  // Checkbox toggle
  row.onclick=(e)=>{
    if(e.target===durInp||e.target===editIcon||e.target===efBtn||efDropdown.contains(e.target))return;
    const nowDone=!isWeekDone(task.id,wk);
    setWeekDone(task.id,wk,nowDone,person);

    if(onToggle)onToggle(task,nowDone);
  };

  row.appendChild(cb);row.appendChild(info);
  return row;

/* ═══ DURATION HISTORY DROPDOWN ═══ */
function showDurDropdown(task,wk,anchorEl,inpEl,defaultMin,onCommit){
  document.querySelectorAll('.dur-hist-dd').forEach(d=>d.remove());
  const current=getMin(task);
  const hist=getMinHistory(task.id);
  const isCustom=st['m_'+task.id]!==undefined;

  const dd=document.createElement('div');
  dd.className='dur-hist-dd';
  dd.style.cssText='position:fixed;background:var(--sf);border:1px solid var(--bdm);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.14);padding:6px;z-index:9999;min-width:200px;max-height:60vh;overflow-y:auto;';
  const rect=anchorEl.getBoundingClientRect();
  const ddEstH=260;
  const spaceBelow=window.innerHeight-rect.bottom;
  const spaceAbove=rect.top;
  if(spaceBelow<ddEstH&&spaceAbove>spaceBelow){
    dd.style.bottom=(window.innerHeight-rect.top+4)+'px';
    dd.style.top='auto';
  } else {
    dd.style.top=(rect.bottom+4)+'px';
  }
  dd.style.left=Math.min(Math.max(rect.left,8),window.innerWidth-210)+'px';

  function makeRow(label,val,isActive,icon,action){
    const row=document.createElement('div');
    row.style.cssText=`display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:12px;${isActive?'background:var(--grl);color:var(--gr);font-weight:600;':'color:var(--tx);'}`;
    row.innerHTML=`<span style="flex-shrink:0;">${icon}</span><span style="flex:1;">${label}</span>${val?`<span style="font-size:11px;font-weight:600;color:var(--tx3);">${fmtMin(val)}</span>`:''}`;
    row.onmouseenter=()=>{if(!isActive)row.style.background='var(--s2)';};
    row.onmouseleave=()=>{if(!isActive)row.style.background='';};
    row.onclick=(e)=>{e.stopPropagation();dd.remove();action();};
    return row;
  }

  // Input row
  const editRow=document.createElement('div');
  editRow.style.cssText='display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid var(--bd);margin-bottom:4px;';
  editRow.innerHTML='<span style="font-size:11px;color:var(--tx3);">✏️ Nouvelle durée :</span>';
  const inp=document.createElement('input');
  inp.type='number';inp.min=1;inp.max=180;inp.value=current;
  inp.style.cssText='width:46px;font-size:12px;font-family:"DM Sans",sans-serif;color:var(--tx);background:var(--s2);border:1px solid var(--grm);border-radius:5px;padding:2px 5px;outline:none;';
  const okBtn=document.createElement('button');
  okBtn.textContent='OK';
  okBtn.style.cssText='padding:2px 8px;border-radius:5px;border:none;background:var(--gr);color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif;';
  okBtn.onclick=(e)=>{e.stopPropagation();const v=parseInt(inp.value)||0;if(v>0)setMin(task.id,v,defaultMin);dd.remove();onCommit();};
  inp.onkeydown=e=>{if(e.key==='Enter')okBtn.click();if(e.key==='Escape')dd.remove();};
  editRow.appendChild(inp);editRow.appendChild(okBtn);
  dd.appendChild(editRow);

  if(hist.length>0){
    const lbl=document.createElement('div');
    lbl.style.cssText='font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);padding:2px 10px 4px;';
    lbl.textContent='Historique';
    dd.appendChild(lbl);
    hist.forEach((h,i)=>{
      dd.appendChild(makeRow(i===0?'Valeur précédente':`Il y a ${i+1} modification${i>0?'s':''}`,h.v,false,'↩',()=>{resetMinToPrev(task.id,h.v);onCommit();}));
    });
    dd.appendChild(Object.assign(document.createElement('div'),{style:'height:1px;background:var(--bd);margin:4px 0;'}));
  }

  if(isCustom){
    dd.appendChild(makeRow(`Valeur d'origine (${fmtMin(defaultMin)})`,null,false,'↺',()=>{resetMinToDefault(task.id);onCommit();}));
  }

  document.body.appendChild(dd);
  inp.focus();inp.select();

  // Close ONLY on click outside the dropdown
  function handleOutsideClick(e){
    if(!dd.contains(e.target)){
      dd.remove();
      document.removeEventListener('click',handleOutsideClick);
    }
  }
  setTimeout(()=>{
    document.addEventListener('click',handleOutsideClick);
  },200); // delay to avoid immediate close
}

/* ═══ RESET MODAL ═══ */
function openResetModal(){
  document.querySelectorAll('.reset-modal-ov').forEach(d=>d.remove());
  const wk=inlineWeek||currentWeekKey();
  const ov=document.createElement('div');
  ov.className='reset-modal-ov';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:9800;';

  const modal=document.createElement('div');
  modal.style.cssText='background:var(--sf);border-radius:16px;box-shadow:0 24px 80px rgba(0,0,0,.22);width:min(480px,calc(100vw - 2rem));overflow:hidden;max-height:calc(100vh - 4rem);overflow-y:auto;';

  const header=document.createElement('div');
  header.style.cssText='padding:1.25rem 1.5rem;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--sf);z-index:1;';
  header.innerHTML='<div style="font-family:\'Fraunces\',serif;font-size:18px;font-weight:500;margin-bottom:4px;">↺ Réinitialisation</div><div style="font-size:12px;color:var(--tx3);">Choisissez ce que vous souhaitez réinitialiser</div>';
  modal.appendChild(header);

  const body=document.createElement('div');
  body.style.cssText='padding:1rem 1.5rem;display:flex;flex-direction:column;gap:8px;';

  function addOption(icon,title,sub,bgColor,action){
    const btn=document.createElement('button');
    btn.style.cssText=`text-align:left;padding:12px 14px;border-radius:10px;border:1px solid var(--bdm);background:${bgColor||'var(--sf)'};cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;`;
    btn.innerHTML=`<div style="font-size:13px;font-weight:600;color:var(--tx);">${icon} ${title}</div><div style="font-size:11px;color:var(--tx3);margin-top:3px;">${sub}</div>`;
    btn.onclick=()=>{ov.remove();action();};
    body.appendChild(btn);
  }

  // Reset week checks
  const weekDoneCount=Object.keys(mst.checks?.[wk]||{}).length;
  addOption('📅',`Décocher la semaine ${weekLabel(wk)}`,`${weekDoneCount} tâche(s) cochée(s) → remet à zéro cette semaine uniquement`,'var(--sf)',()=>{resetWeekChecks(wk);renderAll();});

  // Reset durations per room
  ROOMS.forEach(sec=>{
    const customCount=sec.tasks.filter(t=>st['m_'+t.id]!==undefined).length;
    if(customCount>0){
      addOption(sec.icon,`Réinitialiser les durées — ${sec.name}`,`${customCount} durée(s) modifiée(s) → retour aux valeurs d'origine`,'var(--sf)',()=>{resetSectionMins(sec.id);renderAll();});
    }
  });

  // Reset all durations
  const totalCustom=ROOMS.flatMap(s=>s.tasks).filter(t=>st['m_'+t.id]!==undefined).length;
  if(totalCustom>0){
    addOption('↺','Réinitialiser toutes les durées',`${totalCustom} tâche(s) modifiée(s) → retour aux valeurs d'origine`,'var(--sf)',()=>{
      if(confirm(`Réinitialiser toutes les durées (${totalCustom} tâches) ?`)){ROOMS.forEach(s=>resetSectionMins(s.id));renderAll();}
    });
  }

/* ═══ ACCESSIBILITY: FOCUS TRAP ═══ */
function trapFocus(modalEl){
  const focusable=modalEl.querySelectorAll('button,input,textarea,select,a[href],[tabindex]:not([tabindex="-1"])');
  if(!focusable.length)return;
  const first=focusable[0];const last=focusable[focusable.length-1];
  // Focus first interactive element
  setTimeout(()=>first.focus(),50);
  function handleTab(e){
    if(e.key!=='Tab')return;
    if(e.shiftKey){if(document.activeElement===first){e.preventDefault();last.focus();}}
    else{if(document.activeElement===last){e.preventDefault();first.focus();}}
  }
  modalEl.addEventListener('keydown',handleTab);
  // Return cleanup function
  return()=>modalEl.removeEventListener('keydown',handleTab);
}

// Rooms order
function getRoomsOrder(){
  const saved=st['order_rooms'];
  if(saved){const ids=JSON.parse(saved);const sorted=[];ids.forEach(id=>{const r=ROOMS.find(x=>x.id===id);if(r)sorted.push(r);});ROOMS.forEach(r=>{if(!sorted.find(x=>x.id===r.id))sorted.push(r);});return sorted;}
  return ROOMS;
}
function saveRoomsOrder(arr){st['order_rooms']=JSON.stringify(arr.map(r=>r.id));saveP();}
function getGeneralOrder(){
  const saved=st['order_general'];
  if(saved){const ids=JSON.parse(saved);const sorted=[];ids.forEach(id=>{const s=GENERAL.find(x=>x.id===id);if(s)sorted.push(s);});GENERAL.forEach(s=>{if(!sorted.find(x=>x.id===s.id))sorted.push(s);});return sorted;}
  return GENERAL;
}
function saveGeneralOrder(arr){st['order_general']=JSON.stringify(arr.map(s=>s.id));saveP();}
// Task order within a section
function getTaskOrder(secId,defaultTasks){
  const saved=st['order_tasks_'+secId];
  if(saved){
    const ids=JSON.parse(saved);
    const sorted=[];
    ids.forEach(id=>{const t=defaultTasks.find(x=>x.id===id);if(t)sorted.push(t);});
    defaultTasks.forEach(t=>{if(!sorted.find(x=>x.id===t.id))sorted.push(t);});
    return sorted;
  }
  return defaultTasks;
}

/* ═══ SIDEBAR with section drag & drop ═══ */
function renderSidebar(){
  const rooms=getRoomsOrder();
  const general=getGeneralOrder();

  // Highlight week button
  const weekBtn=document.getElementById('sbWeekBtn');
  if(weekBtn) weekBtn.classList.toggle('active', activeRoom==='__week__');

  function makeDraggableSection(sec,container,list,saveFn){
    const tasks=secTasks(sec);
    const ids=tasks.map(t=>t.id);
    const done=ids.filter(id=>isDone(id)).length;
    const all=ids.length;
    const pct=all>0?Math.round(done/all*100):0;

    const btn=document.createElement('div');
    btn.className='rb'+(sec.id===activeRoom?' active':'')+(pct===100&&all>0?' complete':'');
    btn.dataset.room=sec.id;
    btn.setAttribute('draggable','true');
    btn.innerHTML=`
      <span class="rb-icon" style="cursor:grab;opacity:.4;font-size:11px;margin-right:-2px">⠿</span>
      <span class="rb-icon">${sec.icon}</span>
      <div class="rb-info">
        <div class="rb-name">${sec.name}</div>
        <div class="rb-meta">${done}/${all} · ${pct}%</div>
      </div>
      <div class="rb-bar"><div class="rb-bar-fill" style="width:${pct}%"></div></div>`;

    btn.onclick=(e)=>{
      if(e.target.dataset.dragging)return;
      // Exit express mode if active
      if(expressMode){
        expressMode=false;
        const eb=document.getElementById('expressBtn');
        if(eb){eb.classList.remove('foc');eb.textContent='⚡ Vue express';}
      }
      activeRoom=sec.id;renderAll();
    };

    // Mouse drag for sidebar sections
    btn.addEventListener('dragstart',e=>{
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',sec.id);
      btn.dataset.dragging='1';
      setTimeout(()=>btn.classList.add('dragging-sb'),0);
    });
    btn.addEventListener('dragend',()=>{
      btn.classList.remove('dragging-sb','drag-over-sb');
      delete btn.dataset.dragging;
      container.querySelectorAll('.rb').forEach(b=>b.classList.remove('drag-over-sb'));
    });
    btn.addEventListener('dragover',e=>{
      e.preventDefault();
      container.querySelectorAll('.rb').forEach(b=>b.classList.remove('drag-over-sb'));
      btn.classList.add('drag-over-sb');
    });
    btn.addEventListener('drop',e=>{
      e.preventDefault();
      const fromId=e.dataTransfer.getData('text/plain');
      const toId=sec.id;
      if(fromId===toId)return;
      const fromIdx=list.findIndex(s=>s.id===fromId);
      const toIdx=list.findIndex(s=>s.id===toId);
      if(fromIdx<0||toIdx<0)return;
      const moved=list.splice(fromIdx,1)[0];
      list.splice(toIdx,0,moved);
      saveFn(list);renderAll();
    });

    // Touch drag for sidebar sections
    let sbGhost=null,sbDraggingId=null;
    btn.addEventListener('touchstart',e=>{
      e.preventDefault();
      sbDraggingId=sec.id;
      const touch=e.touches[0];
      sbGhost=btn.cloneNode(true);
      sbGhost.className='touch-ghost';
      sbGhost.style.cssText=`width:${btn.offsetWidth}px;left:${touch.clientX-btn.offsetWidth/2}px;top:${touch.clientY-20}px;border-radius:var(--rsm);`;
      document.body.appendChild(sbGhost);
      btn.style.opacity='.35';
    },{passive:false});
    btn.addEventListener('touchmove',e=>{
      if(!sbGhost)return;e.preventDefault();
      const touch=e.touches[0];
      sbGhost.style.left=touch.clientX-sbGhost.offsetWidth/2+'px';
      sbGhost.style.top=touch.clientY-20+'px';
      container.querySelectorAll('.rb').forEach(b=>b.classList.remove('drag-over-sb'));
      const el=document.elementFromPoint(touch.clientX,touch.clientY)?.closest('.rb');
      if(el&&el!==btn)el.classList.add('drag-over-sb');
    },{passive:false});
    btn.addEventListener('touchend',e=>{
      if(!sbGhost)return;
      const touch=e.changedTouches[0];
      const el=document.elementFromPoint(touch.clientX,touch.clientY)?.closest('.rb');
      sbGhost.remove();sbGhost=null;btn.style.opacity='';
      container.querySelectorAll('.rb').forEach(b=>b.classList.remove('drag-over-sb'));
      if(el&&el!==btn&&el.dataset.room){
        const fromIdx=list.findIndex(s=>s.id===sbDraggingId);
        const toIdx=list.findIndex(s=>s.id===el.dataset.room);
        if(fromIdx>=0&&toIdx>=0){const moved=list.splice(fromIdx,1)[0];list.splice(toIdx,0,moved);saveFn(list);renderAll();}
      }
      sbDraggingId=null;
    });

    container.appendChild(btn);
  }

  const sbR=document.getElementById('sbRooms');
  if(!sbR) return;
  sbR.innerHTML='';
  rooms.forEach(r=>makeDraggableSection(r,sbR,rooms,saveRoomsOrder));
  const sbG=document.getElementById('sbGeneral');
  if(!sbG) return;
  sbG.innerHTML='';
  general.forEach(s=>makeDraggableSection(s,sbG,general,saveGeneralOrder));
}

/* ═══ UNIFIED DRAG (mouse + touch) for task cards ═══ */
function addDragToCard(card,taskId,secId,allSectionTasks){
  const handle=card.querySelector('.drag-handle');
  if(!handle)return;

  // ── MOUSE ──
  card.setAttribute('draggable','true');
  card.addEventListener('dragstart',e=>{
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',taskId);
    setTimeout(()=>card.classList.add('dragging'),0);
  });
  card.addEventListener('dragend',()=>{
    card.classList.remove('dragging','drag-over-top','drag-over-bot');
    document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over-top','drag-over-bot'));
  });
  card.addEventListener('dragover',e=>{
    e.preventDefault();
    document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over-top','drag-over-bot'));
    const rect=card.getBoundingClientRect();
    const mid=rect.top+rect.height/2;
    card.classList.add(e.clientY<mid?'drag-over-top':'drag-over-bot');
  });
  card.addEventListener('drop',e=>{
    e.preventDefault();
    const fromId=e.dataTransfer.getData('text/plain');
    reorderTasks(fromId,taskId,secId,allSectionTasks,e.clientY,card);
  });

  // ── TOUCH ──
  let ghost=null,startX=0,startY=0,draggingId=null;

  handle.addEventListener('touchstart',e=>{
    if(!allSectionTasks)return;
    e.preventDefault();
    const touch=e.touches[0];
    startX=touch.clientX;startY=touch.clientY;
    draggingId=taskId;
    // Create ghost
    ghost=card.cloneNode(true);
    ghost.className='touch-ghost';
    ghost.style.width=card.offsetWidth+'px';
    ghost.style.left=touch.clientX-card.offsetWidth/2+'px';
    ghost.style.top=touch.clientY-20+'px';
    document.body.appendChild(ghost);
    card.style.opacity='.35';
  },{passive:false});

  handle.addEventListener('touchmove',e=>{
    if(!ghost)return;
    e.preventDefault();
    const touch=e.touches[0];
    ghost.style.left=touch.clientX-ghost.offsetWidth/2+'px';
    ghost.style.top=touch.clientY-20+'px';
    // Highlight target
    document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over-top','drag-over-bot'));
    const el=document.elementFromPoint(touch.clientX,touch.clientY)?.closest('.task-card');
    if(el&&el!==card){
      const rect=el.getBoundingClientRect();
      el.classList.add(touch.clientY<rect.top+rect.height/2?'drag-over-top':'drag-over-bot');
    }
  },{passive:false});

  handle.addEventListener('touchend',e=>{
    if(!ghost)return;
    const touch=e.changedTouches[0];
    const el=document.elementFromPoint(touch.clientX,touch.clientY)?.closest('.task-card');
    ghost.remove();ghost=null;
    card.style.opacity='';
    document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over-top','drag-over-bot'));
    if(el&&el!==card&&allSectionTasks){
      const toId=el.dataset.taskId;
      if(toId)reorderTasks(draggingId,toId,secId,allSectionTasks,touch.clientY,el);
    }
    draggingId=null;
  });
}

function reorderTasks(fromId,toId,secId,arr,clientY,targetCard){
  if(fromId===toId||!arr)return;
  const fromIdx=arr.findIndex(t=>t.id===fromId);
  const toIdx=arr.findIndex(t=>t.id===toId);
  if(fromIdx<0||toIdx<0)return;
  const rect=targetCard.getBoundingClientRect();
  const insertAfter=clientY>rect.top+rect.height/2;
  const moved=arr.splice(fromIdx,1)[0];
  const newIdx=arr.findIndex(t=>t.id===toId);
  arr.splice(insertAfter?newIdx+1:newIdx,0,moved);
  saveTaskOrder(secId,arr);
  renderContent();
}

  const ef=task.effort||0;
  if(filter==='done'&&!done)return false;
  if(filter==='pending'&&done)return false;
  if(filter==='e1'&&ef!==1)return false;
  if(filter==='e2'&&ef!==2)return false;
  if(filter==='e3'&&ef!==3)return false;
  return true;
}

function renderRoom(area){
